<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapi Dev | Portfolio</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { text-align: center; padding: 20px; animation: fadeIn 1s ease-out; }
        
        /* Animasi Foto Profil */
        .profile-img { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 4px solid var(--accent); margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--text); }
        .tagline { color: #94a3b8; margin-bottom: 30px; font-size: 1.1rem; }

        .btn-hub { 
            padding: 15px 30px; background: var(--accent); color: white; 
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-decoration: none; display: inline-block;
        }
        .btn-hub:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200&auto=format&fit=crop" alt="Rapi Dev" class="profile-img">
        
        <h1>Rapi Dev</h1>
        <p class="tagline">Web Developer & AI Enthusiast</p>
        
        <a href="index.html" class="btn-hub">Masuk ke AI Hub</a>
    </div>

</body>
</html>
