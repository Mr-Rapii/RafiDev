<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapi Dev | AI Hub Dashboard</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
            authDomain: "piwstore.firebaseapp.com",
            projectId: "piwstore",
            storageBucket: "piwstore.firebasestorage.app",
            messagingSenderId: "419258630997",
            appId: "1:419258630997:web:44dc66ee3840a14a6d25dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Satpam: Cek apakah user sudah login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        // Fungsi Logout
        window.logout = () => {
            signOut(auth).then(() => window.location.href = "login.html");
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; --glass: rgba(30, 41, 59, 0.4); }
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        
        .header-section { text-align: center; margin-bottom: 50px; }
        .logo-img { width: 120px; height: 120px; border-radius: 25px; border: 2px solid rgba(59, 130, 246, 0.5); transition: 0.5s; }
        .logo-img:hover { transform: rotate(10deg) scale(1.05); }
        
        .dashboard { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .tool-card { background: var(--glass); backdrop-filter: blur(10px); padding: 25px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; text-decoration: none; color: white; transition: 0.4s; }
        .tool-card:hover { background: var(--accent); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }

        .logout-btn { background: #ef4444; color: white; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://i.postimg.cc/ctKx1m8x/file-000000009a3c7207a2ab2d81fdc90db8.png" class="logo-img">
        <h1>Rapi Dev</h1>
        <button class="logout-btn" onclick="logout()">Keluar (Logout)</button>
    </div>

    <div class="dashboard">
        <a href="chatbot.html" class="tool-card">💬<br>Asisten</a>
        <a href="gambar.html" class="tool-card">🎨<br>Generator</a>
        <a href="chord.html" class="tool-card">🎸<br>Chord</a>
        <a href="konten.html" class="tool-card">📱<br>Konten</a>
        <a href="tiktok.html" class="tool-card">🎵<br>TikTok DL</a>
        <a href="suara.html" class="tool-card">🔊<br>Teks-Suara</a>
    </div>

    <div id="testimonialWall" style="width: 100%; max-width: 500px;"></div>

    <script>
        // Setup Supabase untuk Load Testimoni
        const supabaseUrl = 'https://tvhhtkkwbxoyztmnkjnh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2aGh0a2t3YnhveXp0bW5ram5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzYxMzAsImV4cCI6MjA5Njg1MjEzMH0.ABm1xdmmHnQl9sLW5Xn09OR7hXV38nau7yFSUIgVbTo';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadTestimoni() {
            const { data } = await supabase.from('testimoni').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('testimonialWall').innerHTML = data.map(t => `
                    <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:15px; margin-bottom:10px; border-left:4px solid #3b82f6;">
                        <div style="color:#fbbf24; font-size:0.8rem;">${"★".repeat(t.rating)}</div>
                        <p style="margin:8px 0;">"${t.pesan}"</p>
                        <small style="color:#3b82f6; font-weight:bold;">— ${t.nama}</small>
                    </div>
                `).join('');
            }
        }
        loadTestimoni();
    </script>
</body>
</html>
