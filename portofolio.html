    <style>
        :root { --glow: 0 0 15px rgba(59, 130, 246, 0.5); }
        body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        .header-section { text-align: center; margin-bottom: 40px; animation: fadeIn 1s; }
        .logo-img { width: 100px; height: 100px; border-radius: 20px; border: 2px solid #3b82f6; box-shadow: var(--glow); transition: 0.5s; }
        .logo-img:hover { transform: scale(1.1); box-shadow: 0 0 30px #3b82f6; }

        .dashboard { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .tool-card { 
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; text-decoration: none; color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tool-card:hover { transform: translateY(-10px); border-color: #3b82f6; box-shadow: var(--glow); }

        .glow-btn { 
            background: #1e293b; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none;
            border: 1px solid #334155; transition: 0.3s;
        }
        .glow-btn:hover { background: #3b82f6; box-shadow: var(--glow); border-color: transparent; }
        .logout-btn { background: #7f1d1d; color: white; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: #991b1b; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-section">

        <h2 style="text-align:center;">Wall of Fame</h2>
    </div>

    <script>
        const supabase = supabase.createClient('https://tvhhtkkwbxoyztmnkjnh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2aGh0a2t3YnhveXp0bW5ram5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzYxMzAsImV4cCI6MjA5Njg1MjEzMH0.ABm1xdmmHnQl9sLW5Xn09OR7hXV38nau7yFSUIgVbTo');

        async function loadTestimoni() {
            const { data } = await supabase.from('testimoni').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('testimonialWall').innerHTML += data.map(t => `
                    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:10px; border-left:4px solid #3b82f6;">
                        <small>${"★".repeat(t.rating)}</small>
                        <p style="margin:5px 0;">"${t.pesan}"</p>
                        <small style="color:#3b82f6;">— ${t.nama}</small>
                    </div>
                `).join('');
            }
        }
        loadTestimoni();
    </script>
