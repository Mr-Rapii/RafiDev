<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Piwstore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* CSS DASAR & TEMA GELAP-ORANYE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .chat-container { background-color: #1a1a1a; width: 100%; max-width: 800px; height: 85vh; border-radius: 10px; border: 1px solid #2d2d2d; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); overflow: hidden; }
        
        .chat-header { background-color: #000000; padding: 15px 20px; border-bottom: 2px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 18px; color: #f39c12; display: flex; align-items: center; gap: 10px; }
        .btn-back { color: #aaa; text-decoration: none; font-size: 14px; transition: color 0.3s; }
        .btn-back:hover { color: #f39c12; }

        .chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .message.bot { background-color: #2d2d2d; color: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
        .message.user { background-color: #f39c12; color: #000; align-self: flex-end; border-bottom-right-radius: 0; font-weight: 500; }
        
        .loading { font-size: 13px; color: #777; font-style: italic; align-self: flex-start; display: none; margin-left: 5px; }

        .input-area { background-color: #000000; padding: 15px 20px; border-top: 1px solid #2d2d2d; display: flex; gap: 10px; }
        .input-area input { flex-grow: 1; padding: 12px 15px; background-color: #1a1a1a; border: 1px solid #444; border-radius: 5px; color: #fff; font-size: 15px; outline: none; transition: border 0.3s; }
        .input-area input:focus { border-color: #f39c12; }
        .btn-send { background-color: #f39c12; color: black; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        .btn-send:hover { background-color: #e67e22; color: white; }
        .btn-send:disabled { background-color: #555; cursor: not-allowed; color: #888; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2><i class="fas fa-robot"></i> Piwstore AI (Bot Raffi)</h2>
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali</a>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">Halo! Saya adalah Bot AI asisten Piwstore. Ada yang bisa saya bantu hari ini?</div>
        </div>
        <div class="loading" id="loadingText">Bot sedang memproses...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Tulis pertanyaan Anda di sini..." onkeypress="handleEnter(event)">
            <button class="btn-send" id="btnSend" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // API Key dari kode curl Anda
        const API_KEY = "AQ.Ab8RN6KpS0VZAombxNWQcdLGO26R-TDU0JbP9hmOml1EgB8TuQ"; 

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const btnSend = document.getElementById('btnSend');
        const loadingText = document.getElementById('loadingText');

        // Deteksi tombol Enter
        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Menampilkan pesan ke layar obrolan
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            // Format teks tebal dari markdown AI
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            // Format enter/baris baru dari AI
            formattedText = formattedText.replace(/\n/g, '<br>');
            
            msgDiv.innerHTML = formattedText;
            chatBox.appendChild(msgDiv);
            
            // Otomatis scroll ke bawah setiap ada pesan baru
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Mengirim data ke server Google
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Tampilkan pesan pengguna
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Kunci tombol input saat loading
            btnSend.disabled = true;
            userInput.disabled = true;
            loadingText.style.display = 'block';

            try {
                // URL Endpoint Gemini Flash Terbaru
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent";
                
                // Fetch request sesuai format curl yang benar
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-goog-api-key': API_KEY 
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: text }]
                        }]
                    })
                });

                const data = await response.json();

                // Membaca respons dan menampilkannya
                if (data.candidates && data.candidates.length > 0) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    appendMessage(aiReply, 'bot');
                } else {
                    appendMessage("Maaf, terjadi kesalahan atau format respons tidak dikenali.", 'bot');
                    console.log(data); // Log error di console untuk debugging
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                appendMessage("Koneksi terputus atau server gagal merespons.", 'bot');
            } finally {
                // Buka kembali kunci tombol input
                btnSend.disabled = false;
                userInput.disabled = false;
                loadingText.style.display = 'none';
                userInput.focus();
            }
        }
    </script>
</body>
</html>
