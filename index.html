<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapii AI Followers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <nav class="bg-black p-4 sticky top-0">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold text-emerald-400">RAPII AI</h1>
      <div id="user-info" class="hidden items-center gap-3">
        <img id="avatar" class="w-8 h-8 rounded-full" src="">
        <span id="username" class="font-medium"></span>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-6">
    <div id="main-content">
      <!-- Konten akan muncul setelah login -->
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
      authDomain: "piwstore.firebaseapp.com",
      projectId: "piwstore",
      storageBucket: "piwstore.firebasestorage.app",
      messagingSenderId: "419258630997",
      appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let coins = 0;

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        loadUserData();
      }
    });

    function loadUserData() {
      db.collection("users").doc(currentUser.uid).get().then(doc => {
        if (doc.exists) {
          coins = doc.data().coins || 0;
        } else {
          db.collection("users").doc(currentUser.uid).set({ coins: 0, name: currentUser.displayName, email: currentUser.email });
        }
        renderDashboard();
      });
    }

    function renderDashboard() {
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('avatar').src = currentUser.photoURL;
      document.getElementById('username').textContent = currentUser.displayName;

      document.getElementById('main-content').innerHTML = `
        <div class="text-center mb-8">
          <div class="text-7xl font-bold text-emerald-400">${coins}</div>
          <p class="text-zinc-400">Koin Kamu (1 Koin = 1 Follower)</p>
        </div>

        <!-- Task -->
        <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
          <h2 class="text-xl font-semibold mb-4">Misi Pertama</h2>
          <p class="text-lg">Follow Instagram <span class="text-pink-500 font-bold">@rapii_wehhh</span></p>
          <button onclick="claimFollowTask()" class="mt-6 w-full bg-pink-600 py-4 rounded-2xl text-lg font-medium">
            Klaim 1 Koin
          </button>
        </div>

        <!-- Marketplace -->
        <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
          <h2 class="text-xl font-semibold mb-4">Tukar Koin → Followers</h2>
          <div class="grid grid-cols-3 gap-4 text-center">
            <div onclick="buyFollowers('tiktok')" class="bg-zinc-800 p-4 rounded-2xl cursor-pointer">
              <i class="fab fa-tiktok text-4xl text-red-500"></i>
              <p class="mt-2">TikTok</p>
              <p class="text-emerald-400 font-bold">10 Koin</p>
            </div>
            <div onclick="buyFollowers('instagram')" class="bg-zinc-800 p-4 rounded-2xl cursor-pointer">
              <i class="fab fa-instagram text-4xl text-pink-500"></i>
              <p class="mt-2">Instagram</p>
              <p class="text-emerald-400 font-bold">8 Koin</p>
            </div>
            <div onclick="buyFollowers('youtube')" class="bg-zinc-800 p-4 rounded-2xl cursor-pointer">
              <i class="fab fa-youtube text-4xl text-red-500"></i>
              <p class="mt-2">YouTube</p>
              <p class="text-emerald-400 font-bold">15 Koin</p>
            </div>
          </div>
        </div>

        <!-- AI Chat -->
        <div class="bg-zinc-900 rounded-3xl p-6">
          <h2 class="text-xl font-semibold mb-4">Rapii AI Assistant</h2>
          <div id="chat-box" class="h-80 overflow-y-auto bg-zinc-950 rounded-2xl p-4 mb-4 text-sm"></div>
          <div class="flex gap-2">
            <input id="chat-input" type="text" placeholder="Tanya AI..." class="flex-1 bg-zinc-800 px-4 py-3 rounded-2xl">
            <button onclick="sendAI()" class="bg-emerald-500 px-6 rounded-2xl">Kirim</button>
          </div>
        </div>
      `;
      addInitialChatMessage();
    }

    function claimFollowTask() {
      if (coins >= 1) return alert("Kamu sudah klaim misi ini!");
      
      coins += 1;
      db.collection("users").doc(currentUser.uid).update({ coins: coins });
      alert("✅ +1 Koin berhasil! Terima kasih sudah follow @rapii_wehhh");
      renderDashboard();
    }

    function buyFollowers(platform) {
      const prices = { tiktok: 10, instagram: 8, youtube: 15 };
      const cost = prices[platform];
      
      if (coins < cost) return alert("Koin tidak cukup!");
      
      coins -= cost;
      db.collection("users").doc(currentUser.uid).update({ coins: coins });
      alert(`✅ Permintaan ${platform.toUpperCase()} Followers berhasil dikirim!`);
      renderDashboard();
    }

    function sendAI() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;

      const chat = document.getElementById('chat-box');
      chat.innerHTML += `<p class="text-right text-emerald-400">${msg}</p>`;

      input.value = "";

      setTimeout(() => {
        let reply = "Mau saling follow? Kerjain misi dulu biar dapat koin!";
        if (msg.toLowerCase().includes("koin")) reply = `Kamu punya ${coins} koin sekarang.`;
        if (msg.toLowerCase().includes("follow")) reply = "Follow @rapii_wehhh lalu klaim koinnya.";
        
        chat.innerHTML += `<p class="text-zinc-300">${reply}</p>`;
        chat.scrollTop = chat.scrollHeight;
      }, 800);
    }

    function addInitialChatMessage() {
      document.getElementById('chat-box').innerHTML = `<p class="text-emerald-400">Halo! Sudah login. Mau saya bantu dapat followers?</p>`;
    }
  </script>
</body>
</html>
