<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Rapi-Dev</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; }
        
        body { 
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at bottom right, #1e3a8a, #0f172a); 
            font-family: 'Segoe UI', sans-serif;
        }
        
        .login-card { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px);
            padding: 2.5rem; border-radius: 25px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            /* Menggunakan max-width agar tidak terlalu lebar di PC, tapi fleksibel di HP */
            width: 90%; max-width: 400px;
        }

        h2 { color: white; font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 1rem; }

        button { 
            padding: 1rem; background: white; border: none; border-radius: 12px;
            color: #1e293b; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        /* Responsif untuk layar sangat kecil */
        @media (max-width: 480px) {
            .login-card { padding: 20px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Selamat Datang</h2>
        <p>Silakan masuk untuk melanjutkan ke dashboard portofolio</p>
        <button id="loginBtn">
            <img src="https://cdn-icons-png.flaticon.com/24/2991/2991148.png" width="20">
            Masuk dengan Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
          authDomain: "piwstore.firebaseapp.com",
          projectId: "piwstore",
          storageBucket: "piwstore.firebasestorage.app",
          messagingSenderId: "419258630997",
          appId: "1:419258630997:web:44dc66ee3840a14a6d25dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById("loginBtn").onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "portofolio.html";
            } catch (error) {
                alert("Login gagal: " + error.message);
            }
        };
    </script>
</body>
</html>
