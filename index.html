<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapii Followers AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <nav class="bg-black p-4">
    <div class="max-w-6xl mx-auto flex justify-between">
      <h1 class="text-3xl font-bold text-emerald-400">RAPIIAI</h1>
      <button onclick="loginGoogle()" id="login-btn" 
        class="bg-white text-black px-6 py-2 rounded-full font-medium">
        <i class="fab fa-google"></i> Login Gmail
      </button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-6" id="main-content">
    <!-- Konten akan muncul setelah login -->
    <p class="text-center text-zinc-400">Login dulu untuk menggunakan fitur</p>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
      authDomain: "piwstore.firebaseapp.com",
      projectId: "piwstore",
      storageBucket: "piwstore.firebasestorage.app",
      messagingSenderId: "419258630997",
      appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    function loginGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    }

    // Handle Redirect Result
    auth.getRedirectResult()
      .then((result) => {
        if (result.user) {
          handleUser(result.user);
        }
      })
      .catch((error) => {
        console.error(error);
        alert("Login error: " + error.message);
      });

    // Cek status login
    auth.onAuthStateChanged((user) => {
      if (user) {
        handleUser(user);
      } else {
        document.getElementById('main-content').innerHTML = `
          <div class="text-center mt-20">
            <p class="text-2xl mb-6">Selamat datang di Rapii AI</p>
            <button onclick="loginGoogle()" class="bg-white text-black px-8 py-4 rounded-2xl text-lg font-medium">
              Login dengan Gmail
            </button>
          </div>`;
      }
    });

    function handleUser(user) {
      currentUser = user;
      document.getElementById('main-content').innerHTML = `
        <div class="text-center">
          <img src="${user.photoURL}" class="w-24 h-24 rounded-full mx-auto border-4 border-emerald-500">
          <h2 class="text-2xl mt-4">${user.displayName}</h2>
          <p class="text-emerald-400">${user.email}</p>
          <div class="mt-10 bg-zinc-900 rounded-3xl p-8">
            <p class="text-emerald-400">Saldo Koin</p>
            <div id="coin" class="text-8xl font-bold text-emerald-400">0</div>
          </div>
          <button onclick="claimTask()" class="mt-8 w-full bg-pink-600 py-5 rounded-2xl text-lg">
            Klaim 1 Koin (Follow @rapii_wehhh)
          </button>
        </div>`;
    }

    function claimTask() {
      alert("✅ +1 Koin berhasil ditambahkan! (Simulasi)");
      // Nanti bisa ditambah simpan ke Firestore
    }

    // Auto check saat halaman load
    window.onload = () => {
      console.log("Halaman dimuat");
    };
  </script>
</body>
</html>
