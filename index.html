<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Piwstore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Navigasi / Header */
        .navbar { background-color: #2d2d2d; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .navbar h1 { color: #4CAF50; font-size: 24px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .user-email { font-size: 14px; color: #ccc; }
        
        /* Tombol Logout */
        .btn-logout { background-color: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-logout:hover { background-color: #d32f2f; }

        /* Konten Utama */
        .container { padding: 40px 30px; flex-grow: 1; text-align: center; }
        .container h2 { margin-bottom: 10px; font-size: 28px; }
        .container p { color: #aaa; margin-bottom: 40px; }

        /* Grid Produk Sederhana */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .product-card { background-color: #2d2d2d; padding: 20px; border-radius: 10px; text-align: left; }
        .product-img { width: 100%; height: 150px; background-color: #444; border-radius: 5px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; color: #777; }
        .product-card h3 { font-size: 18px; margin-bottom: 10px; }
        .product-card .price { color: #4CAF50; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .btn-buy { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-buy:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>Piwstore</h1>
        <div class="nav-right">
            <span class="user-email" id="userEmail">Memuat...</span>
            <button id="btnLogout" class="btn-logout">Keluar</button>
        </div>
    </div>

    <div class="container">
        <h2>Selamat Datang di Piwstore</h2>
        <p>Anda telah berhasil masuk ke dalam sistem.</p>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">Gambar Produk</div>
                <h3>Produk Contoh 1</h3>
                <div class="price">Rp 150.000</div>
                <button class="btn-buy" onclick="alert('Ini hanya contoh!')">Beli Sekarang</button>
            </div>
            <div class="product-card">
                <div class="product-img">Gambar Produk</div>
                <h3>Produk Contoh 2</h3>
                <div class="price">Rp 250.000</div>
                <button class="btn-buy" onclick="alert('Ini hanya contoh!')">Beli Sekarang</button>
            </div>
            <div class="product-card">
                <div class="product-img">Gambar Produk</div>
                <h3>Produk Contoh 3</h3>
                <div class="price">Rp 99.000</div>
                <button class="btn-buy" onclick="alert('Ini hanya contoh!')">Beli Sekarang</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Import fungsi onAuthStateChanged (cek status) dan signOut (keluar)
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Konfigurasi asli Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
            authDomain: "piwstore.firebaseapp.com",
            projectId: "piwstore",
            storageBucket: "piwstore.firebasestorage.app",
            messagingSenderId: "419258630997",
            appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc",
            measurementId: "G-M6NHQMHQV4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 1. SISTEM PROTEKSI HALAMAN
        // Fungsi ini berjalan otomatis saat halaman dibuka
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jika user sudah login, tampilkan emailnya di pojok kanan atas
                document.getElementById('userEmail').innerText = user.email;
            } else {
                // Jika tidak ada user yang login, tendang kembali ke halaman login
                window.location.href = "login.html";
            }
        });

        // 2. FUNGSI TOMBOL KELUAR (LOGOUT)
        const btnLogout = document.getElementById('btnLogout');
        btnLogout.addEventListener('click', () => {
            signOut(auth).then(() => {
                // Setelah berhasil keluar, arahkan ke halaman login
                window.location.href = "login.html";
            }).catch((error) => {
                alert("Terjadi kesalahan saat proses keluar.");
                console.error(error);
            });
        });
    </script>
</body>
</html>
