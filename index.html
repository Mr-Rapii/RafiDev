<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapi Dev | AI Hub Dashboard</title>
    <style>
        :root { 
            --bg: #0f172a; --accent: #3b82f6; --glass: rgba(30, 41, 59, 0.5); --text: #f8fafc; 
        }

        body { 
            margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a); color: var(--text);
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        /* Header Profil */
        .profile { text-align: center; margin-bottom: 30px; animation: fadeIn 1s; }
        .profile img { 
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent);
            animation: pulse 3s infinite; margin-bottom: 10px;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } }

        /* Dashboard Grid */
        .dashboard { 
            width: 100%; max-width: 400px; display: grid; gap: 15px; 
        }

        .tool-card { 
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; color: white; display: flex; align-items: center; gap: 15px;
            transition: 0.3s; animation: slideUp 0.5s forwards; opacity: 0;
        }
        .tool-card:hover { transform: scale(1.02); background: rgba(59, 130, 246, 0.2); border-color: var(--accent); }
        
        .icon { font-size: 1.5rem; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }
        .info h3 { margin: 0; font-size: 1rem; }
        .info p { margin: 0; font-size: 0.75rem; color: #94a3b8; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="profile">
        <img src="https://ui-avatars.com/api/?name=Rapi+Dev&background=3b82f6&color=fff&size=100" alt="Rapi">
        <h1>AI Hub Rapi</h1>
        <p style="color:#94a3b8">Pilih asisten yang kamu butuhkan:</p>
    </div>

    <div class="dashboard">
        <a href="chatbot.html" class="tool-card" style="animation-delay: 0.1s;">
            <div class="icon">💬</div>
            <div class="info"><h3>Asisten AI</h3><p>Chat interaktif & personal</p></div>
        </a>

        <a href="gambar.html" class="tool-card" style="animation-delay: 0.2s;">
            <div class="icon">🎨</div>
            <div class="info"><h3>Generator Gambar</h3><p>Ubah teks menjadi visual</p></div>
        </a>

        <a href="chord.html" class="tool-card" style="animation-delay: 0.3s;">
            <div class="icon">🎸</div>
            <div class="info"><h3>Chord Gitar</h3><p>Lirik & kunci lagu instan</p></div>
        </a>

        <a href="konten.html" class="tool-card" style="animation-delay: 0.4s;">
            <div class="icon">📱</div>
            <div class="info"><h3>Konten Kreator</h3><p>Strategi & ide konten</p></div>
        </a>
    </div>

</body>
</html>
