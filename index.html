<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapi Dev | AI Hub</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: radial-gradient(circle at top right, #1e3a8a, transparent), 
                        radial-gradient(circle at bottom left, #4338ca, transparent);
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header & Navigasi */
        .header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .header .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.1rem; }
        
        .btn-back {
            text-decoration: none;
            color: var(--accent);
            font-size: 0.85rem;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .btn-back:hover { background: var(--accent); color: white; }

        .nav-tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            margin: 10px 20px;
            border-radius: 12px;
            gap: 5px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab.active { background: var(--accent); color: white; font-weight: bold; }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Animasi Pesan Muncul */
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: messageIn 0.4s ease-out forwards;
            position: relative;
        }

        .user-msg {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .ai-msg {
            background: var(--glass);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Tombol Aksi (Suara & Salin) */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            border-top: 1px solid var(--border);
            padding-top: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { color: var(--accent); }

        /* Input Area */
        .input-wrapper {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .input-box {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 5px 5px 5px 20px;
            align-items: center;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            outline: none;
            padding: 10px 0;
            font-size: 0.95rem;
        }

        .send-btn {
            background: var(--accent);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.1); }
        .send-btn svg { fill: white; width: 20px; }

        .typing-indicator {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 10px;
            margin-left: 20px;
            display: none;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Scrollbar Custom */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <span>🤖</span> Rapi AI Hub
        </div>
        <a href="portofolio.html" class="btn-back">← Portofolio</a>
    </div>

    <div class="nav-tabs">
        <a href="index.html" class="tab active">Asisten AI</a>
        <a href="gambar.html" class="tab">Generator Gambar</a>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="message ai-msg">
            Halo Rapi Dev! Ada yang bisa saya bantu hari ini?
        </div>
    </div>

    <div class="typing-indicator" id="typing">Bot Rapi sedang mengetik...</div>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="prompt" placeholder="Tanya sesuatu..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="askAI()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('prompt');
        const typingIndicator = document.getElementById('typing');
        let history = [];

        function handleEnter(e) { if (e.key === 'Enter') askAI(); }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'user-msg' : 'ai-msg'}`;
            
            if (sender === 'ai') {
                div.innerHTML = `<span>${text}</span>
                    <div class="actions">
                        <button class="action-btn" onclick="speak('${text}')">🔊 Suara</button>
                        <button class="action-btn" onclick="copy(this, '${text}')">📋 Salin</button>
                    </div>`;
            } else {
                div.innerText = text;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function askAI() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            appendMessage(prompt, 'user');
            promptInput.value = '';
            typingIndicator.style.display = 'block';

            // API Key Obfuscation (Tetap aman seperti permintaanmu)
            const b1 = "AQ.Ab8RN6I17XNIEcT7Mx2C"; 
            const b2 = "mRe7UxYMdK9xqGAfsImM-nLsqCNr1g";
            const KEY = b1 + b2;

            const system = "Kamu adalah Bot Rapi, asisten cerdas Rapi Dev. Kamu jenius dalam coding, web dev, dan strategi konten. Jawab dengan gaya keren, profesional, dan to-the-point.";
            
            history.push({ role: "user", parts: [{ text: prompt }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: system }] },
                        contents: history
                    })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage(aiText, 'ai');
                history.push({ role: "model", parts: [{ text: aiText }] });
            } catch (err) {
                typingIndicator.style.display = 'none';
                appendMessage("Error: Gagal terhubung ke otak AI.", 'ai');
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'id-ID';
            window.speechSynthesis.speak(speech);
        }

        function copy(btn, text) {
            navigator.clipboard.writeText(text);
            btn.innerText = "✅ Tersalin";
            setTimeout(() => btn.innerText = "📋 Salin", 2000);
        }
    </script>
</body>
</html>
