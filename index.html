<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Piwstore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- CSS DASAR & TEMA --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; }

        /* --- HEADER --- */
        .header { background-color: #000000; border-bottom: 2px solid #2d2d2d; }
        
        /* NavAtas: Logo, Search, Tombol Masuk */
        .nav-top { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #ffffff; }
        .logo span { color: #f39c12; } /* Aksen oranye pada logo */

        .search-bar { flex-grow: 1; max-width: 500px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px; background-color: #2d2d2d; border: 1px solid #444; border-radius: 5px; color: #fff; }
        .search-bar .fa-search { position: absolute; right: 15px; top: 13px; color: #777; }

        .user-section { display: flex; align-items: center; gap: 15px; }
        .btn-login-nav { background-color: #f39c12; color: black; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-login-nav:hover { background-color: #e67e22; color: white; }

        /* NavBawah: Link Navigasi */
        .nav-bottom { background-color: #1a1a1a; padding: 10px 30px; border-top: 1px solid #2d2d2d; }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { font-size: 14px; transition: color 0.3s; }
        .nav-links a:hover { color: #f39c12; }

        /* --- KONTEN UTAMA --- */
        .main { padding: 30px; flex-grow: 1; }

        /* Judul Kategori */
        .category-header { font-size: 18px; color: #aaa; margin-bottom: 20px; border-bottom: 1px solid #2d2d2d; padding-bottom: 10px; }

        /* Grid Produk */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        /* Kartu Produk */
        .product-card { background-color: #1a1a1a; border-radius: 8px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #2d2d2d; position: relative; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2); border-color: #f39c12; }

        .product-img { width: 100%; height: 120px; background-color: #333; display: flex; justify-content: center; align-items: center; color: #777; font-size: 14px; }
        .product-info { padding: 15px; }
        .product-card h3 { font-size: 16px; margin-bottom: 5px; color: #ffffff; }
        .product-card .price { color: #f39c12; font-weight: bold; font-size: 14px; }
        
        /* Ikon panah di dalam kartu */
        .product-card .fa-chevron-right { position: absolute; right: 15px; top: 15px; color: #555; }
        .product-card:hover .fa-chevron-right { color: #f39c12; }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-top">
            <div class="logo"><span>Piw</span>Store</div>
            <div class="search-bar">
                <input type="text" placeholder="Cari layanan...">
                <i class="fas fa-search"></i>
            </div>
            <div class="user-section">
                <a href="login.html" class="btn-login-nav"><i class="fas fa-sign-in-alt"></i> Masuk</a>
            </div>
        </div>
        
        <div class="nav-bottom">
            <ul class="nav-links">
                <li><a href="#"><i class="fas fa-home"></i> BERANDA</a></li>
                <li><a href="#"><i class="fas fa-list"></i> ORDER</a></li>
                <li><a href="#"><i class="fas fa-comment-dots"></i> LAINNYA</a></li>
            </ul>
        </div>
    </header>

    <main class="main">
        <div class="category-header">KATEGORI PRODUK</div>

        <div class="product-grid">
            <a href="#" class="product-card">
                <div class="product-img">Gambar</div>
                <div class="product-info">
                    <h3>Diamond MLBB</h3>
                    <div class="price">Mulai Rp 1.579</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="#" class="product-card">
                <div class="product-img">Gambar</div>
                <div class="product-info">
                    <h3>Voucher Garena</h3>
                    <div class="price">Mulai Rp 10.000</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="#" class="product-card">
                <div class="product-img">Gambar</div>
                <div class="product-info">
                    <h3>Diamond Free Fire</h3>
                    <div class="price">Mulai Rp 2.500</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="#" class="product-card">
                <div class="product-img">Gambar</div>
                <div class="product-info">
                    <h3>Pulsa All Operator</h3>
                    <div class="price">Mulai Rp 5.000</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="#" class="product-card">
                <div class="product-img">Gambar</div>
                <div class="product-info">
                    <h3>Paket Data</h3>
                    <div class="price">Mulai Rp 15.000</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </main>

</body>
</html>
