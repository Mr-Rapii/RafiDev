<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Piwstore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #ffffff; }
        .register-container { background-color: #2d2d2d; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); width: 100%; max-width: 400px; margin: 20px; }
        .register-container h2 { text-align: center; margin-bottom: 30px; color: #4CAF50; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 5px; background-color: #1a1a1a; color: #fff; font-size: 15px; }
        .input-group input:focus { outline: none; border-color: #4CAF50; }
        .btn-register { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        .btn-register:hover { background-color: #45a049; }
        .footer-text { text-align: center; margin-top: 20px; font-size: 14px; }
        .footer-text a { color: #4CAF50; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Daftar Akun Baru</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="name">Nama Lengkap</label>
                <input type="text" id="name" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Kata Sandi (Min. 6 Karakter)</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="input-group">
                <label for="confirm_password">Konfirmasi Kata Sandi</label>
                <input type="password" id="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn-register" id="btnSubmit">Daftar Sekarang</button>
        </form>
        <div class="footer-text">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Konfigurasi asli Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
            authDomain: "piwstore.firebaseapp.com",
            projectId: "piwstore",
            storageBucket: "piwstore.firebasestorage.app",
            messagingSenderId: "419258630997",
            appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc",
            measurementId: "G-M6NHQMHQV4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const btnSubmit = document.getElementById('btnSubmit');

            if (password !== confirmPassword) {
                alert("Kata sandi dan konfirmasi tidak cocok!");
                return;
            }

            btnSubmit.innerHTML = "Memproses...";
            btnSubmit.disabled = true;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Pendaftaran berhasil! Silakan masuk.");
                    window.location.href = "login.html"; 
                })
                .catch((error) => {
                    alert("Error: Pendaftaran gagal (Mungkin email sudah terdaftar atau jaringan bermasalah).");
                    console.error(error);
                    btnSubmit.innerHTML = "Daftar Sekarang";
                    btnSubmit.disabled = false;
                });
        });
    </script>
</body>
</html>
