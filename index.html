<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapi Dev | AI Hub Dashboard</title>
    <style>
        :root { --bg: #0f172a; --accent: #3b82f6; --glass: rgba(30, 41, 59, 0.5); --text: #f8fafc; }
        body { 
            margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e3a8a, #0f172a); color: var(--text);
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }

        /* Animasi Muncul */
        @keyframes appear { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .header-section { text-align: center; margin-bottom: 40px; }
        .logo-img { 
            width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent);
            object-fit: cover; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); margin-bottom: 15px;
        }
        h1 { font-size: 2.2rem; margin: 0; }
        .sub-link { color: #94a3b8; text-decoration: none; border-bottom: 1px solid #475569; }

        /* Dashboard */
        .dashboard { width: 100%; max-width: 500px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 40px; }
        .tool-card { 
            background: var(--glass); backdrop-filter: blur(12px); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white;
            display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0;
        }
        .tool-card:hover { transform: translateY(-5px); background: rgba(59, 130, 246, 0.3); border-color: var(--accent); }

        /* Tombol Glow */
        .glow-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 50px; }
        .glow-btn {
            background: #1e293b; color: white; padding: 15px 25px; border-radius: 50px;
            text-decoration: none; font-weight: bold; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
        }
        .glow-btn:hover { box-shadow: 0 0 20px var(--accent); border-color: var(--accent); transform: scale(1.05); }

        /* Testimoni Otomatis */
        .testimonial-section { width: 100%; max-width: 500px; margin-bottom: 50px; }
        .testimonial-wall { display: flex; flex-direction: column; gap: 15px; }
        .testimonial-card { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px;
            border-left: 4px solid var(--accent); backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="header-section fade-in">
        <img src="https://i.postimg.cc/ctKx1m8x/file-000000009a3c7207a2ab2d81fdc90db8.png" alt="Rapi-Dev" class="logo-img">
        <h1>Rapi-Dev</h1>
        <a href="about.html" class="sub-link">Tentang Saya & Visi AI Hub →</a>
    </div>

    <div class="dashboard" id="dash">
        <a href="chatbot.html" class="tool-card"><h3>💬 Asisten</h3></a>
        <a href="gambar.html" class="tool-card"><h3>🎨 Generator</h3></a>
        <a href="chord.html" class="tool-card"><h3>🎸 Chord</h3></a>
        <a href="konten.html" class="tool-card"><h3>📱 Konten</h3></a>
        <a href="tiktok.html" class="tool-card"><h3>🎵 TikTok DL</h3></a>
        <a href="suara.html" class="tool-card"><h3>🔊 Teks-Suara</h3></a>
        <a href="tugas.html" class="tool-card"><h3>📚 Tugas</h3></a>
        <a href="penghitung.html" class="tool-card"><h3>🔢 Hitung</h3></a>
        <a href="teks.html" class="tool-card"><h3>📝 Teks</h3></a>
        <a href="qr.html" class="tool-card"><h3>🔲 QR Code</h3></a>
    </div>

    <div class="glow-container fade-in">
        <a href="lapor.html" class="glow-btn">🛠 Lapor Bug</a>
        <a href="rating.html" class="glow-btn">⭐ Rating</a>
    </div>

    <div class="testimonial-section fade-in">
        <h2 style="text-align: center;">Wall of Fame</h2>
        <div class="testimonial-wall" id="testimonialWall">
            <p style="text-align:center;">Memuat testimoni...</p>
        </div>
    </div>

    <script>
        // Animasi muncul berurutan
        document.querySelectorAll('.tool-card').forEach((card, index) => {
            card.style.animation = `appear 0.8s ease forwards ${0.1 + (index * 0.05)}s`;
        });

        // Fetch Testimoni Otomatis
        const API_URL = 'https://script.google.com/macros/s/AKfycbwXtZ5VnQQgUsfKMtFa_x1SLzYmCiBc8Rl-KysxVrXYF6f7YXqV1pq6JjH7lii9JeJb2w/exec';
        
        fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            const wall = document.getElementById('testimonialWall');
            if(data.length > 0) {
                wall.innerHTML = data.map(t => `
                    <div class="testimonial-card">
                        <small>${"⭐".repeat(t.rating || 0)}</small>
                        <p style="margin: 5px 0;">"${t.pesan}"</p>
                        <strong>- ${t.nama}</strong>
                    </div>
                `).join('');
            } else {
                wall.innerHTML = "<p style='text-align:center;'>Belum ada testimoni.</p>";
            }
        })
        .catch(err => {
            console.log(err);
            document.getElementById('testimonialWall').innerHTML = "<p style='text-align:center;'>Gagal memuat data.</p>";
        });
    </script>
</body>
</html>
