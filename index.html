<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapii AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">

  <div class="max-w-md mx-auto">
    <h1 class="text-5xl font-bold text-emerald-400 text-center mb-10">RAPII AI</h1>
    
    <div id="status" class="text-center p-8 bg-zinc-900 rounded-3xl">
      <p class="text-xl">Silakan Login</p>
    </div>

    <button onclick="loginGoogle()" 
      class="w-full mt-8 bg-white text-black py-6 rounded-3xl text-xl font-medium flex items-center justify-center gap-3 shadow-lg">
      <i class="fab fa-google text-xl"></i> 
      Login dengan Gmail
    </button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
      authDomain: "piwstore.firebaseapp.com",
      projectId: "piwstore",
      storageBucket: "piwstore.firebasestorage.app",
      messagingSenderId: "419258630997",
      appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function loginGoogle() {
      document.getElementById('status').innerHTML = `<p class="text-yellow-400">Mengarahkan ke Google...</p>`;
      
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    }

    // Handle hasil redirect
    auth.getRedirectResult()
      .then((result) => {
        if (result.user) {
          document.getElementById('status').innerHTML = `
            <p class="text-green-400 text-2xl">✅ Login Berhasil!</p>
            <p class="mt-4">${result.user.email}</p>
            <p class="text-emerald-400 mt-6">Selamat datang di Rapii AI</p>
          `;
        }
      })
      .catch((error) => {
        document.getElementById('status').innerHTML = `
          <p class="text-red-400">Error: \( {error.code}<br> \){error.message}</p>
        `;
      });

    // Cek status login
    auth.onAuthStateChanged((user) => {
      if (user) {
        document.getElementById('status').innerHTML = `
          <p class="text-green-400 text-2xl">✅ Sudah Login</p>
          <p>${user.email}</p>
        `;
      }
    });
  </script>
</body>
</html>
