<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Rapi-Dev</title>
    <style>
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; }
        button { padding: 15px 30px; background: #db4437; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login Akun</h2>
    <button id="loginBtn">Login dengan Google</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
      authDomain: "piwstore.firebaseapp.com",
      projectId: "piwstore",
      storageBucket: "piwstore.firebasestorage.app",
      messagingSenderId: "419258630997",
      appId: "1:419258630997:web:44dc66ee3840a14a6d25dc",
      measurementId: "G-V9WR4ZWPT1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("loginBtn").onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
            alert("Login Berhasil!");
            window.location.href = "portofolio.html";
        } catch (error) {
            alert("Login gagal: " + error.message);
        }
    };
</script>
</body>
</html>
