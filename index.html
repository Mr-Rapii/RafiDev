<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapi Dev | Official Portfolio</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --accent: #3b82f6; 
            --secondary: #8b5cf6;
            --glass: rgba(255, 255, 255, 0.05); 
            --text: #f8fafc; 
        }

        body { 
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at 20% 80%, #1e3a8a, transparent), 
                        radial-gradient(circle at 80% 20%, #4338ca, transparent);
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
        }

        .card { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            animation: appear 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            max-width: 400px; width: 90%;
        }

        @keyframes appear { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .profile-img { 
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent);
            margin-bottom: 20px; animation: pulse 3s infinite;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .typing { font-size: 1.1rem; color: #94a3b8; overflow: hidden; border-right: 2px solid var(--accent); white-space: nowrap; animation: typing 3s steps(30, end), blink .75s step-end infinite; margin: 15px auto; width: fit-content; }
        @keyframes typing { from { width: 0 } to { width: 230px } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--accent) } }

        /* Button Group */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        
        .btn-hub { 
            padding: 15px; background: var(--accent); color: white; border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.4s;
            text-decoration: none; display: block; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-hub.secondary { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); }
        .btn-hub:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://ui-avatars.com/api/?name=Rapi+Dev&background=3b82f6&color=fff&size=150" alt="Rapi Dev" class="profile-img">
        <h1>Rapi Dev</h1>
        <div class="typing">Web Developer & AI Hub</div>
        <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">Pilih alat AI yang ingin digunakan:</p>
        
        <div class="btn-group">
            <a href="chatbot.html" class="btn-hub">💬 Asisten Rapi</a>
            <a href="gambar.html" class="btn-hub secondary">🎨 Generator Gambar</a>
        </div>
    </div>

</body>
</html>
