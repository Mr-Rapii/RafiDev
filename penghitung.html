<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Rapi | 📝 Penghitung Teks</title>
    <style>
        :root { 
            --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); 
            --accent: #3b82f6; --danger: #ef4444; --text: #f8fafc; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn { 
            color: var(--accent); text-decoration: none; font-size: 0.9rem; 
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--accent); transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); color: white; }
        
        /* Nav Bar (Bisa di-scroll ke samping) */
        .nav-wrapper { padding: 0 15px; }
        .nav-bar { 
            display: flex; background: rgba(0,0,0,0.2); padding: 5px; margin-top: 15px; 
            border-radius: 12px; gap: 5px; overflow-x: auto; white-space: nowrap;
            /* Menyembunyikan scrollbar tapi tetap bisa di-scroll */
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .nav-bar::-webkit-scrollbar { display: none; }
        
        .nav-link { 
            flex: 0 0 auto; text-align: center; padding: 10px 15px; color: #94a3b8; 
            text-decoration: none; font-size: 0.85rem; border-radius: 8px; transition: 0.3s; 
        }
        .nav-link.active { background: var(--accent); color: white; font-weight: bold; }
        
        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .tool-container { 
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; 
            background: var(--glass); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* Text Area */
        textarea { 
            width: 100%; height: 180px; background: rgba(15, 23, 42, 0.6); color: white; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; 
            font-size: 0.95rem; resize: none; outline: none; line-height: 1.6; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        /* Grid Statistik */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; margin-top: 5px; }
        .stat-card { 
            background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin-bottom: 5px; transition: 0.3s; }
        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        /* Tombol Hapus */
        button.btn-clear { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); 
            border-radius: 12px; padding: 15px; font-weight: bold; font-size: 0.95rem; 
            cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        button.btn-clear:hover { background: var(--danger); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Portofolio</a>
        <h3 style="margin: 0; font-size: 1.1rem;">📝 Penghitung Teks</h3>
        <div style="width: 80px;"></div> </header>
    
    <div class="nav-wrapper">
        <div class="nav-bar">
            <a href="chatbot.html" class="nav-link">💬 Chat</a>
            <a href="gambar.html" class="nav-link">🎨 Gambar</a>
            <a href="konten.html" class="nav-link">📱 Konten</a>
            <a href="chord.html" class="nav-link">🎸 Chord</a>
            <a href="tiktok.html" class="nav-link">🎵 TikTok</a>
            <a href="teks.html" class="nav-link">✨ Teks</a>
            <a href="suara.html" class="nav-link">🎙️ Suara</a>
            <a href="qr.html" class="nav-link">🔳 QR</a>
            <a href="penghitung.html" class="nav-link active">📝 Penghitung</a>
            <a href="tugas.html" class="nav-link">📚 Tugas</a>
        </div>
    </div>

    <div class="main-content">
        <div class="tool-container">
            <textarea id="textInput" placeholder="Ketik atau tempel naskah/deskripsi kontenmu di sini..." oninput="hitungTeks()"></textarea>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">Karakter</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">Kata</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sentenceCount">0</div>
                    <div class="stat-label">Kalimat</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="paragraphCount">0</div>
                    <div class="stat-label">Paragraf</div>
                </div>
            </div>

            <button class="btn-clear" onclick="hapusTeks()">🗑️ Bersihkan Area Teks</button>
        </div>
    </div>

    <script>
        function hitungTeks() {
            const text = document.getElementById('textInput').value;
            
            // Hitung Karakter
            const charCount = text.length;
            
            // Hitung Kata
            const words = text.trim().split(/\s+/);
            const wordCount = text.trim() === '' ? 0 : words.length;
            
            // Hitung Kalimat
            const sentences = text.split(/[.!?]+/).filter(sentence => sentence.trim().length > 0);
            const sentenceCount = text.trim() === '' ? 0 : sentences.length;
            
            // Hitung Paragraf
            const paragraphs = text.split(/\n+/).filter(paragraph => paragraph.trim().length > 0);
            const paragraphCount = text.trim() === '' ? 0 : paragraphs.length;

            // Animasi angka (Opsional tapi memperbagus feel aplikasi)
            updateAngka('charCount', charCount);
            updateAngka('wordCount', wordCount);
            updateAngka('sentenceCount', sentenceCount);
            updateAngka('paragraphCount', paragraphCount);
        }

        // Fungsi agar update angka terasa lebih responsif
        function updateAngka(id, nilai) {
            const el = document.getElementById(id);
            if(el.innerText != nilai) {
                el.innerText = nilai;
                el.style.transform = "scale(1.2)";
                setTimeout(() => el.style.transform = "scale(1)", 150);
            }
        }

        function hapusTeks() {
            const textArea = document.getElementById('textInput');
            textArea.value = '';
            hitungTeks(); 
            textArea.focus(); // Otomatis fokus kembali ke kotak teks setelah dihapus
        }
    </script>
</body>
</html>
