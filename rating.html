<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beri Rating - Rapi-Dev</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .form-container { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Beri Rating</h2>
    <input type="text" id="username" placeholder="Nama Kamu">
    <select id="ratingBintang">
        <option value="5">⭐⭐⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
    </select>
    <textarea id="pesan" rows="4" placeholder="Apa pendapatmu?"></textarea>
    <button id="btnKirim" onclick="kirimData()">Kirim Rating</button>
</div>

<script>
    // --- LANGKAH TERAKHIR: Masukkan URL dan Key di sini ---
    const supabaseUrl = 'https://tvhhtkkwbxoyztmnkjnh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2aGh0a2t3YnhveXp0bW5ram5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzYxMzAsImV4cCI6MjA5Njg1MjEzMH0.ABm1xdmmHnQl9sLW5Xn09OR7hXV38nau7yFSUIgVbTo';
    
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function kirimData() {
        const btn = document.getElementById('btnKirim');
        const nama = document.getElementById('username').value;
        const rating = document.getElementById('ratingBintang').value;
        const pesan = document.getElementById('pesan').value;

        if (!nama || !pesan) return alert("Isi semua data!");

        btn.innerText = "Mengirim...";
        btn.disabled = true;

        const { error } = await supabase
            .from('testimoni')
            .insert([{ nama, rating: parseInt(rating), pesan }]);

        if (error) {
            alert("Error: " + error.message);
            btn.innerText = "Kirim Rating";
            btn.disabled = false;
        } else {
            alert("Berhasil!");
            window.location.href = "portofolio.html";
        }
    }
</script>
</body>
</html>
