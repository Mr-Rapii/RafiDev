<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Beri Rating - Rapi-Dev</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Tambahkan CSS estetik sesuai desain dashboard utama */
        body { background: #0f172a; color: white; display: flex; justify-content: center; padding: 50px; font-family: sans-serif; }
        .form-container { background: rgba(30, 41, 59, 0.8); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Beri Rating</h2>
    <input type="text" id="username" placeholder="Nama Kamu">
    <select id="ratingBintang">
        <option value="5">⭐⭐⭐⭐⭐ (5)</option>
        <option value="4">⭐⭐⭐⭐ (4)</option>
        <option value="3">⭐⭐⭐ (3)</option>
    </select>
    <textarea id="pesan" placeholder="Ceritakan pengalamanmu..."></textarea>
    <button onclick="kirimKeSupabase()">Kirim Rating</button>
</div>

<script>
    // MASUKKAN KEMBALI URL & KEY SUPABASE KAMU DI SINI (Gunakan Public Key)
    const supabase = supabase.createClient('https://tvhhtkkwbxoyztmnkjnh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2aGh0a2t3YnhveXp0bW5ram5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzYxMzAsImV4cCI6MjA5Njg1MjEzMH0.ABm1xdmmHnQl9sLW5Xn09OR7hXV38nau7yFSUIgVbTo');

    async function kirimKeSupabase() {
        const nama = document.getElementById('username').value;
        const rating = document.getElementById('ratingBintang').value;
        const pesan = document.getElementById('pesan').value;

        const { data, error } = await supabase
            .from('testimoni')
            .insert([{ nama: nama, rating: parseInt(rating), pesan: pesan }]);

        if (error) {
            alert("Gagal kirim: " + error.message);
        } else {
            alert("Terima kasih! Rating berhasil dikirim.");
            window.location.href = "index.html"; // Balik ke dashboard otomatis
        }
    }
</script>
</body>
</html>
