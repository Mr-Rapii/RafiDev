<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub | Generator Gambar</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); --accent: #3b82f6; --text: #f8fafc; }
        
        body { 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: var(--text); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Navigasi & Header */
        header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn { 
            color: var(--accent); text-decoration: none; font-size: 0.9rem; 
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--accent);
        }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab { color: #94a3b8; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; }
        .tab.active { background: var(--accent); color: white; }

        /* Main Content */
        .container { max-width: 500px; margin: 0 auto 40px auto; padding: 20px; text-align: center; }
        
        textarea { 
            width: 100%; height: 100px; background: rgba(0,0,0,0.3); color: white; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px;
            font-size: 1rem; outline: none; margin-bottom: 15px; resize: none;
        }
        
        button { 
            width: 100%; padding: 15px; background: var(--accent); color: white; 
            border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #2563eb; transform: scale(1.02); }

        /* Area Gambar */
        .result-area { 
            margin-top: 30px; min-height: 300px; border-radius: 20px; 
            background: rgba(0,0,0,0.2); border: 2px dashed rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            position: relative; transition: 0.5s;
        }
        
        .result-area img { width: 100%; height: auto; display: none; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Animasi Loading Spinner */
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .download-btn { display: none; margin-top: 20px; padding: 12px; background: #10b981; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="portofolio.html" class="back-btn">← Portofolio</a>
        <h3 style="margin:0">🎨 Generator</h3>
        <div style="width: 80px;"></div> </header>

    <div class="nav-tabs">
        <a href="chatbot.html" class="tab">Chatbot</a>
        <a href="gambar.html" class="tab active">Generator</a>
    </div>

    <div class="container">
        <textarea id="prompt" placeholder="Contoh: Futuristic robot in cyberpunk city..."></textarea>
        <button id="generateBtn" onclick="buatGambar()">Buat Gambar</button>

        <div class="result-area" id="resultArea">
            <div id="loader" class="loader"></div>
            <img id="outputImage" alt="Hasil">
            <span id="statusText" style="color:#64748b">Gambar akan muncul di sini...</span>
        </div>

        <a id="downloadBtn" class="download-btn" href="#" download="RapiArt.jpg">⬇️ Download Gambar</a>
    </div>

    <script>
        function buatGambar() {
            const prompt = document.getElementById('prompt').value.trim();
            const btn = document.getElementById('generateBtn');
            const img = document.getElementById('outputImage');
            const loader = document.getElementById('loader');
            const status = document.getElementById('statusText');
            const dl = document.getElementById('downloadBtn');

            if (!prompt) return alert("Masukkan deskripsi gambar!");

            // UI State: Loading
            btn.disabled = true;
            btn.innerText = "Seni sedang dibuat...";
            loader.style.display = 'block';
            img.style.display = 'none';
            status.style.display = 'none';
            dl.style.display = 'none';

            const seed = Math.floor(Math.random() * 1000000);
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&nologo=true`;

            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                dl.style.display = 'block';
                dl.href = url;
                btn.disabled = false;
                btn.innerText = "Buat Gambar";
            };

            img.onerror = () => {
                loader.style.display = 'none';
                status.style.display = 'block';
                status.innerText = "Error: Server sedang sibuk. Coba lagi!";
                btn.disabled = false;
                btn.innerText = "Buat Gambar";
            };

            img.src = url;
        }
    </script>
</body>
</html>
