<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Rapi | ✨ Generator Teks</title>
    <style>
        :root { 
            --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); 
            --accent: #3b82f6; --success: #10b981; --text: #f8fafc; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn { 
            color: var(--accent); text-decoration: none; font-size: 0.9rem; 
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--accent); transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); color: white; }
        
        /* Nav Bar Scroll */
        .nav-wrapper { padding: 0 15px; }
        .nav-bar { 
            display: flex; background: rgba(0,0,0,0.2); padding: 5px; margin-top: 15px; 
            border-radius: 12px; gap: 5px; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .nav-bar::-webkit-scrollbar { display: none; }
        
        .nav-link { 
            flex: 0 0 auto; text-align: center; padding: 10px 15px; color: #94a3b8; 
            text-decoration: none; font-size: 0.85rem; border-radius: 8px; transition: 0.3s; 
        }
        .nav-link.active { background: var(--accent); color: white; font-weight: bold; }
        
        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .tool-container { 
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; 
            background: var(--glass); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); animation: slideDown 0.5s ease-out;
            margin-bottom: 20px;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"] { 
            width: 100%; background: rgba(15, 23, 42, 0.6); color: white; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; 
            font-size: 1rem; outline: none; transition: 0.3s; text-align: center; font-weight: bold;
        }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        /* Grid Hasil Teks */
        .result-grid { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        
        .text-card { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; gap: 15px; transition: 0.3s;
            animation: fadeIn 0.4s ease-out;
        }
        .text-card:hover { transform: translateX(5px); border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .text-output { font-size: 1.15rem; color: #f8fafc; word-break: break-all; flex: 1; }
        
        button.copy-btn { 
            background: rgba(59, 130, 246, 0.2); color: var(--accent); border: 1px solid var(--accent); 
            border-radius: 8px; padding: 8px 15px; font-size: 0.85rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s; min-width: 75px;
        }
        button.copy-btn:hover { background: var(--accent); color: white; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>

    <header>
        <a href="portofolio.html" class="back-btn">← Portofolio</a>
        <h3 style="margin: 0; font-size: 1.1rem;">✨ Font Estetik</h3>
        <div style="width: 80px;"></div> </header>
    
    <div class="nav-wrapper">
        <div class="nav-bar">
            <a href="chatbot.html" class="nav-link">💬 Chat</a>
            <a href="gambar.html" class="nav-link">🎨 Gambar</a>
            <a href="konten.html" class="nav-link">📱 Konten</a>
            <a href="chord.html" class="nav-link">🎸 Chord</a>
            <a href="tiktok.html" class="nav-link">🎵 TikTok</a>
            <a href="teks.html" class="nav-link active">✨ Teks</a>
            <a href="suara.html" class="nav-link">🎙️ Suara</a>
            <a href="qr.html" class="nav-link">🔳 QR</a>
            <a href="penghitung.html" class="nav-link">📝 Penghitung</a>
            <a href="tugas.html" class="nav-link">📚 Tugas</a>
        </div>
    </div>

    <div class="main-content">
        <div class="tool-container">
            <input type="text" id="textInput" placeholder="Ketik namamu di sini (Contoh: Rapi)" oninput="generateStyles()">
        </div>

        <div class="result-grid" id="resultGrid">
            </div>
    </div>

    <script>
        const chars = Array.from('abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ');
        const doubleStruck = Array.from('𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ');
        const fraktur = Array.from('𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷𝔄𝔅ℭ𝔇𝔈𝔉𝔊ℌℑ𝔍𝔎𝔏𝔐𝔑𝔒𝔓𝔔ℜ𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ');
        const cursive = Array.from('𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩');

        function convertText(text, targetArray) {
            let res = '';
            for(let c of text) {
                let idx = chars.indexOf(c);
                res += (idx !== -1) ? targetArray[idx] : c;
            }
            return res;
        }

        function generateStyles() {
            const input = document.getElementById('textInput').value.trim();
            const grid = document.getElementById('resultGrid');
            grid.innerHTML = ''; 

            if(!input) return;

            const results = [
                convertText(input, doubleStruck),
                convertText(input, fraktur),
                convertText(input, cursive),
                `꧁༺ ${input} ༻꧂`,
                `『 ${input} 』亗`,
                `×͜× ${input} ☠︎︎`,
                `★彡 ${input} 彡★`,
                `【 ${input} 】`
            ];

            results.forEach(text => {
                const safeText = text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                grid.innerHTML += `
                    <div class="text-card">
                        <div class="text-output">${text}</div>
                        <button class="copy-btn" onclick="copyText(this, '${safeText}')">Salin</button>
                    </div>
                `;
            });
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = '✅ OK';
                btn.style.background = 'var(--success)';
                btn.style.color = 'white';
                btn.style.borderColor = 'var(--success)';
                
                setTimeout(() => { 
                    btn.innerText = oldText; 
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }, 1500);
            });
        }
    </script>
</body>
</html>
