<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamus Pintar · Rapi Dev</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03030a;--surface:rgba(15,15,35,.75);--blue:#3b82f6;--cyan:#06b6d4;--violet:#7c3aed;--green:#4ade80;--text:#e2e8f0;--muted:#64748b}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(59,130,246,.18) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 75%,rgba(6,182,212,.14) 0%,transparent 60%);
  animation:auroraShift 12s ease-in-out infinite alternate}
@keyframes auroraShift{0%{transform:scale(1)}100%{transform:scale(1.08) rotate(2deg)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);
  background-size:50px 50px}

.wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;max-width:700px;margin:0 auto}

.back-btn{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600;padding:6px 14px;border:1px solid rgba(255,255,255,.07);border-radius:50px;transition:.3s;margin-bottom:28px}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

.header{text-align:center;margin-bottom:36px;animation:slideDown .8s cubic-bezier(.16,1,.3,1) both}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.brand{font-size:.75rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;opacity:.8}
.page-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,7vw,2.8rem);font-weight:800;background:linear-gradient(135deg,#fff 20%,var(--cyan) 55%,var(--blue) 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.page-sub{font-size:.9rem;color:var(--muted)}

/* ── LANG SWITCH ── */
.lang-row{display:flex;gap:8px;margin-bottom:24px;animation:fadeUp .8s .2s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lang-btn{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:50px;padding:8px 18px;font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;transition:.3s}
.lang-btn.active,.lang-btn:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.5);color:var(--blue)}

/* ── SEARCH BOX ── */
.search-wrap{width:100%;position:relative;margin-bottom:24px;animation:fadeUp .8s .3s both}
.search-input{width:100%;background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px 60px 18px 24px;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;color:var(--text);outline:none;transition:border-color .3s,box-shadow .3s;backdrop-filter:blur(14px)}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(59,130,246,.5);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.search-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:12px;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform .3s,box-shadow .3s}
.search-btn:hover{transform:translateY(-50%) scale(1.1);box-shadow:0 4px 16px rgba(59,130,246,.4)}

/* ── HISTORY ── */
.history-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;min-height:28px;animation:fadeUp .8s .4s both}
.hist-tag{font-size:.72rem;font-weight:600;padding:4px 10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:50px;color:var(--blue);cursor:pointer;transition:.25s}
.hist-tag:hover{background:rgba(59,130,246,.2)}

/* ── LOADING ── */
.loading-orbs{display:none;gap:8px;justify-content:center;padding:20px}
.loading-orbs.visible{display:flex}
.orb-dot{width:10px;height:10px;border-radius:50%;animation:orbPulse 1.2s ease-in-out infinite}
.orb-dot:nth-child(1){background:var(--blue)}
.orb-dot:nth-child(2){background:var(--cyan);animation-delay:.2s}
.orb-dot:nth-child(3){background:var(--violet);animation-delay:.4s}
@keyframes orbPulse{0%,100%{transform:scale(.6);opacity:.4}50%{transform:scale(1.2);opacity:1}}

/* ── RESULT ── */
.result-wrap{width:100%;display:none}
.result-wrap.visible{display:block;animation:fadeUp .5s both}

.word-hero{background:var(--surface);border:1px solid rgba(59,130,246,.2);border-radius:24px;padding:28px;margin-bottom:16px;backdrop-filter:blur(16px);position:relative;overflow:hidden}
.word-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:24px 24px 0 0}
.word-main{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.word-pron{font-size:.85rem;color:var(--muted);margin-bottom:12px;font-style:italic}
.word-type-badge{display:inline-block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);border-radius:50px;color:var(--cyan);margin-bottom:14px}

.def-section{margin-bottom:16px}
.def-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.def-item{padding:10px 14px;background:rgba(255,255,255,.03);border-left:2px solid var(--blue);border-radius:0 8px 8px 0;margin-bottom:8px;font-size:.9rem;line-height:1.7}

.example-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:12px;padding:14px;font-size:.88rem;font-style:italic;line-height:1.7;color:var(--text);margin-bottom:16px}
.example-box::before{content:'"';font-size:2rem;color:var(--blue);opacity:.4;display:block;line-height:.5;margin-bottom:4px}

.synonym-row{display:flex;gap:8px;flex-wrap:wrap}
.syn-tag{font-size:.75rem;font-weight:600;padding:5px 12px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:50px;color:#a78bfa;cursor:pointer;transition:.25s}
.syn-tag:hover{background:rgba(124,58,237,.2)}

.footer{margin-top:60px;text-align:center;font-size:.75rem;color:var(--muted)}
.footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div class="aurora"></div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <a href="portofolio.html" class="back-btn">← Kembali</a>

  <div class="header">
    <p class="brand">📖 Rapi Dev · Kamus Pintar</p>
    <h1 class="page-title">Kamus Pintar</h1>
    <p class="page-sub">Cari arti kata dalam Bahasa Indonesia atau Inggris</p>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" data-lang="Indonesia" onclick="selectLang(this)">🇮🇩 Indonesia</button>
    <button class="lang-btn" data-lang="Inggris" onclick="selectLang(this)">🇬🇧 Inggris</button>
    <button class="lang-btn" data-lang="Keduanya" onclick="selectLang(this)">🌐 Dua Bahasa</button>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="wordInput" type="text" placeholder="Ketik kata yang ingin dicari..." autocomplete="off"
      onkeydown="if(event.key==='Enter')searchWord()">
    <button class="search-btn" onclick="searchWord()">🔍</button>
  </div>

  <div class="history-row" id="historyRow"></div>

  <div class="loading-orbs" id="loadingOrbs">
    <div class="orb-dot"></div><div class="orb-dot"></div><div class="orb-dot"></div>
  </div>

  <div class="result-wrap" id="resultWrap">
    <div class="word-hero">
      <div class="word-main" id="wordMain"></div>
      <div class="word-pron" id="wordPron"></div>
      <div class="word-type-badge" id="wordType"></div>
      <div class="def-label">📌 Definisi</div>
      <div id="defContainer"></div>
      <div class="def-label">💬 Contoh Kalimat</div>
      <div class="example-box" id="exampleBox"></div>
      <div class="def-label">🔗 Sinonim</div>
      <div class="synonym-row" id="synonymRow"></div>
    </div>
  </div>

  <div class="footer"><p>© 2025 <a href="#">Rapi Dev</a> · Powered by Claude AI 📖</p></div>
</div>

<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;stars=Array.from({length:150},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+.2,o:Math.random(),s:Math.random()*.005+.002}))}
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.o+=s.s;if(s.o>1||s.o<0)s.s*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,210,255,${s.o*.6})`;ctx.fill()});requestAnimationFrame(draw)}
  resize();window.addEventListener('resize',resize);draw();
})();

let selectedLang='Indonesia';
const history=[];

function selectLang(el){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');selectedLang=el.dataset.lang;
}

function addHistory(word){
  if(!history.includes(word)){history.unshift(word);if(history.length>6)history.pop()}
  const row=document.getElementById('historyRow');
  row.innerHTML=history.map(w=>`<span class="hist-tag" onclick="document.getElementById('wordInput').value='${w}';searchWord()">${w}</span>`).join('');
}

async function searchWord(){
  const word=document.getElementById('wordInput').value.trim();
  if(!word)return;
  const loading=document.getElementById('loadingOrbs');
  const wrap=document.getElementById('resultWrap');
  loading.classList.add('visible');wrap.classList.remove('visible');

  const prompt=`Kamu adalah kamus linguistik profesional. Berikan definisi lengkap untuk kata "${word}" dalam bahasa ${selectedLang}.

Balas HANYA dalam format JSON berikut (tanpa tanda backtick, tanpa komentar):
{
  "kata": "${word}",
  "pengucapan": "fonetik atau transliterasi",
  "jenis": "kata benda / kata kerja / kata sifat / dsb",
  "definisi": ["definisi 1", "definisi 2 jika ada"],
  "contoh": "contoh kalimat lengkap menggunakan kata ini",
  "sinonim": ["sinonim1", "sinonim2", "sinonim3"],
  "terjemahan": "terjemahan dalam bahasa lain jika relevan"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    let text=data.content.map(i=>i.text||'').join('');
    text=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);

    document.getElementById('wordMain').textContent=parsed.kata;
    document.getElementById('wordPron').textContent=parsed.pengucapan?`/ ${parsed.pengucapan} /`:'';
    document.getElementById('wordType').textContent=parsed.jenis||'kata';

    const defContainer=document.getElementById('defContainer');
    defContainer.innerHTML=(parsed.definisi||[]).map((d,i)=>`<div class="def-item">${i+1}. ${d}</div>`).join('');

    document.getElementById('exampleBox').textContent=parsed.contoh||'-';

    const synRow=document.getElementById('synonymRow');
    synRow.innerHTML=(parsed.sinonim||[]).map(s=>`<span class="syn-tag" onclick="document.getElementById('wordInput').value='${s}';searchWord()">${s}</span>`).join('');

    loading.classList.remove('visible');wrap.classList.add('visible');
    addHistory(word);
  }catch(e){
    loading.classList.remove('visible');
    document.getElementById('wordMain').textContent='Kata tidak ditemukan';
    document.getElementById('wordPron').textContent='';
    document.getElementById('wordType').textContent='error';
    document.getElementById('defContainer').innerHTML='<div class="def-item">Coba kata lain atau periksa ejaan.</div>';
    document.getElementById('exampleBox').textContent='-';
    document.getElementById('synonymRow').innerHTML='';
    wrap.classList.add('visible');
  }
}
</script>
</body>
</html>
