<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch & Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Rajdhani',sans-serif;min-height:100vh;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden}
  .grid{position:fixed;inset:0;background:radial-gradient(ellipse at center,#001a2e 0%,#000 70%);z-index:0}
  .grid::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px);background-size:30px 30px}
  .container{position:relative;z-index:1;width:min(420px,95vw);text-align:center}
  .tabs{display:flex;gap:0;background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.15);border-radius:100px;padding:4px;margin-bottom:36px}
  .tabs button{flex:1;background:none;border:none;color:rgba(0,200,255,.5);padding:10px;border-radius:100px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;transition:.3s;letter-spacing:1px}
  .tabs button.active{background:rgba(0,200,255,.15);color:#00c8ff;box-shadow:0 0 20px rgba(0,200,255,.2)}
  .display{margin-bottom:32px}
  .clock-ring{position:relative;display:inline-block}
  svg.ring{width:260px;height:260px}
  .track{fill:none;stroke:rgba(0,200,255,.08);stroke-width:8}
  .prog{fill:none;stroke:#00c8ff;stroke-width:8;stroke-linecap:round;stroke-dasharray:706.86;stroke-dashoffset:706.86;transition:stroke-dashoffset .1s linear;filter:drop-shadow(0 0 8px #00c8ff)}
  .clock-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .time-main{font-family:'Orbitron',monospace;font-size:2.6rem;font-weight:900;color:#00c8ff;text-shadow:0 0 20px rgba(0,200,255,.8),0 0 40px rgba(0,200,255,.4);letter-spacing:2px;line-height:1}
  .time-ms{font-family:'Orbitron',monospace;font-size:1.2rem;color:rgba(0,200,255,.6);margin-top:4px}
  .label-tag{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(0,200,255,.4);margin-top:6px}
  /* Stopwatch controls */
  .sw-controls{display:flex;justify-content:center;gap:16px;margin-bottom:24px}
  .sw-controls button{width:70px;height:70px;border-radius:50%;font-size:1.4rem;cursor:pointer;border:2px solid;transition:.3s}
  .sw-controls button:hover{transform:scale(1.08)}
  .btn-start{background:rgba(0,255,120,.1);border-color:rgba(0,255,120,.5);color:#00ff78;box-shadow:0 0 20px rgba(0,255,120,.2)}
  .btn-start.running{background:rgba(255,70,70,.1);border-color:rgba(255,70,70,.5);color:#ff4646;box-shadow:0 0 20px rgba(255,70,70,.2)}
  .btn-lap{background:rgba(0,200,255,.08);border-color:rgba(0,200,255,.3);color:#00c8ff}
  .btn-reset{background:rgba(255,200,0,.08);border-color:rgba(255,200,0,.3);color:#ffc800}
  .laps{max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,200,255,.3) transparent}
  .lap-item{display:flex;justify-content:space-between;padding:7px 16px;border-bottom:1px solid rgba(0,200,255,.07);font-family:'Orbitron',monospace;font-size:.75rem;color:rgba(0,200,255,.6)}
  .lap-item:first-child{color:#00c8ff}
  /* Timer controls */
  .timer-set{display:none;gap:16px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
  .timer-set .time-part{text-align:center}
  .timer-set label{font-size:.7rem;letter-spacing:2px;color:rgba(0,200,255,.4);display:block;margin-bottom:4px}
  .timer-set input{width:70px;background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.2);border-radius:10px;color:#00c8ff;font-family:'Orbitron',monospace;font-size:1.2rem;text-align:center;padding:10px 4px;outline:none}
  .tc-controls{display:flex;justify-content:center;gap:16px}
  .tc-controls button{width:70px;height:70px;border-radius:50%;font-size:1.4rem;cursor:pointer;border:2px solid;transition:.3s}
</style>
</head>
<body>
<div class="grid"></div>
<div class="container">
  <div class="tabs">
    <button class="active" onclick="switchTab('sw',this)">⏱ Stopwatch</button>
    <button onclick="switchTab('tm',this)">⏲ Timer</button>
  </div>

  <!-- STOPWATCH -->
  <div id="swPanel">
    <div class="display">
      <div class="clock-ring">
        <svg class="ring" viewBox="0 0 240 240">
          <circle class="track" cx="120" cy="120" r="112"/>
          <circle class="prog" id="swRing" cx="120" cy="120" r="112" transform="rotate(-90,120,120)"/>
        </svg>
        <div class="clock-inner">
          <div class="time-main" id="swMain">00:00</div>
          <div class="time-ms" id="swMs">.000</div>
          <div class="label-tag">stopwatch</div>
        </div>
      </div>
    </div>
    <div class="sw-controls">
      <button class="btn-start" id="swStartBtn" onclick="swToggle()">▶</button>
      <button class="btn-lap" onclick="swLap()">⏱</button>
      <button class="btn-reset" onclick="swReset()">↺</button>
    </div>
    <div class="laps" id="lapsList"></div>
  </div>

  <!-- TIMER -->
  <div id="tmPanel" style="display:none">
    <div class="display">
      <div class="clock-ring">
        <svg class="ring" viewBox="0 0 240 240">
          <circle class="track" cx="120" cy="120" r="112"/>
          <circle class="prog" id="tmRing" cx="120" cy="120" r="112" transform="rotate(-90,120,120)" style="stroke:#a78bfa;filter:drop-shadow(0 0 8px #a78bfa)"/>
        </svg>
        <div class="clock-inner">
          <div class="time-main" id="tmMain">00:00</div>
          <div class="time-ms" id="tmSub">siap</div>
          <div class="label-tag">countdown</div>
        </div>
      </div>
    </div>
    <div class="timer-set" id="timerSet" style="display:flex">
      <div class="time-part"><label>JAM</label><input type="number" id="tmH" min="0" max="99" value="0" onchange="updateTmDisplay()"></div>
      <div class="time-part"><label>MENIT</label><input type="number" id="tmM" min="0" max="59" value="5" onchange="updateTmDisplay()"></div>
      <div class="time-part"><label>DETIK</label><input type="number" id="tmS" min="0" max="59" value="0" onchange="updateTmDisplay()"></div>
    </div>
    <div class="tc-controls">
      <button class="btn-start" id="tmStartBtn" onclick="tmToggle()" style="background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.5);color:#a78bfa;box-shadow:0 0 20px rgba(167,139,250,.2)">▶</button>
      <button class="btn-reset" onclick="tmReset()" style="background:rgba(255,200,0,.08);border-color:rgba(255,200,0,.3);color:#ffc800">↺</button>
    </div>
  </div>
</div>

<script>
// --- STOPWATCH ---
let swRunning=false,swStart=0,swElapsed=0,swInterval,laps=[];
function pad(n,d=2){return String(~~n).padStart(d,'0')}
function fmtSw(ms){const m=~~(ms/60000),s=~~(ms/1000)%60,c=ms%1000;return{main:pad(m)+':'+pad(s),ms:'.'+pad(c,3)}}
function updateSw(){
  const total=swElapsed+(swRunning?Date.now()-swStart:0);
  const f=fmtSw(total);
  document.getElementById('swMain').textContent=f.main;
  document.getElementById('swMs').textContent=f.ms;
  // Ring: one revolution per minute
  const sec=total/1000%60;
  const offset=706.86-(706.86*(sec/60));
  document.getElementById('swRing').style.strokeDashoffset=offset;
}
function swToggle(){
  if(swRunning){swElapsed+=Date.now()-swStart;clearInterval(swInterval);swRunning=false;document.getElementById('swStartBtn').textContent='▶';document.getElementById('swStartBtn').classList.remove('running');}
  else{swStart=Date.now();swInterval=setInterval(updateSw,50);swRunning=true;document.getElementById('swStartBtn').textContent='⏸';document.getElementById('swStartBtn').classList.add('running');}
}
function swLap(){
  if(!swRunning)return;
  const total=swElapsed+(Date.now()-swStart);
  laps.unshift(total);
  const el=document.getElementById('lapsList');
  el.innerHTML=laps.map((t,i)=>{const f=fmtSw(t);return`<div class="lap-item"><span>Lap ${laps.length-i}</span><span>${f.main}${f.ms}</span></div>`}).join('');
}
function swReset(){clearInterval(swInterval);swRunning=false;swElapsed=0;laps=[];document.getElementById('lapsList').innerHTML='';document.getElementById('swStartBtn').textContent='▶';document.getElementById('swStartBtn').classList.remove('running');updateSw();}

// --- TIMER ---
let tmRunning=false,tmTotal=0,tmRemain=0,tmInterval,tmDone=false;
function updateTmDisplay(){
  const h=+document.getElementById('tmH').value||0,m=+document.getElementById('tmM').value||0,s=+document.getElementById('tmS').value||0;
  tmTotal=(h*3600+m*60+s)*1000;tmRemain=tmTotal;
  document.getElementById('tmMain').textContent=pad(h*60+m)+':'+pad(s);
  document.getElementById('tmSub').textContent='siap';
  document.getElementById('tmRing').style.strokeDashoffset=0;
}
function tmTick(){
  tmRemain-=100;
  if(tmRemain<=0){tmRemain=0;clearInterval(tmInterval);tmRunning=false;tmDone=true;document.getElementById('tmMain').textContent='00:00';document.getElementById('tmSub').textContent='⏰ SELESAI!';document.getElementById('tmRing').style.strokeDashoffset=706.86;document.getElementById('tmStartBtn').textContent='▶';beep();return;}
  const h=~~(tmRemain/3600000),m=~~(tmRemain/60000)%60,s=~~(tmRemain/1000)%60;
  document.getElementById('tmMain').textContent=pad(h>0?h*60+m:m)+':'+pad(s);
  const pct=1-tmRemain/tmTotal;
  document.getElementById('tmRing').style.strokeDashoffset=706.86*pct;
  document.getElementById('tmSub').textContent=h>0?pad(h)+'j '+pad(m)+'m '+pad(s)+'d':pad(m)+'m '+pad(s)+'d';
}
function tmToggle(){
  if(tmDone)return;
  if(tmRunning){clearInterval(tmInterval);tmRunning=false;document.getElementById('tmStartBtn').textContent='▶';}
  else{if(tmRemain<=0)return;tmInterval=setInterval(tmTick,100);tmRunning=true;document.getElementById('tmStartBtn').textContent='⏸';}
}
function tmReset(){clearInterval(tmInterval);tmRunning=false;tmDone=false;document.getElementById('tmStartBtn').textContent='▶';updateTmDisplay();}
function beep(){try{const ac=new AudioContext();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.setValueAtTime(.5,ac.currentTime);g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+1);o.start();o.stop(ac.currentTime+1);}catch(e){}}
updateTmDisplay();

function switchTab(tab,btn){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('swPanel').style.display=tab==='sw'?'block':'none';
  document.getElementById('tmPanel').style.display=tab==='tm'?'block':'none';
}
</script>
</body>
</html>
