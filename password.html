<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Password</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:#08080f;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;padding:20px}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.04) 1px,transparent 1px);background-size:40px 40px;z-index:0}
  .scan{position:fixed;inset:0;background:linear-gradient(transparent 50%,rgba(0,255,136,.02) 50%);background-size:100% 4px;z-index:0;animation:scanAnim 0.1s linear infinite}
  @keyframes scanAnim{from{background-position:0 0}to{background-position:0 4px}}
  .container{position:relative;z-index:1;width:min(460px,100%);background:rgba(0,255,136,.03);border:1px solid rgba(0,255,136,.15);border-radius:4px;padding:36px;box-shadow:0 0 60px rgba(0,255,136,.05),inset 0 0 60px rgba(0,0,0,.3)}
  .corner{position:absolute;width:16px;height:16px;border-color:#00ff88;border-style:solid}
  .corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
  .corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
  .corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
  .corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
  h1{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:#00ff88;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .sub{font-size:.75rem;color:rgba(0,255,136,.5);font-family:'JetBrains Mono',monospace;margin-bottom:28px}
  .pw-display{background:#000;border:1px solid rgba(0,255,136,.2);border-radius:4px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;min-height:58px}
  .pw-text{font-family:'JetBrains Mono',monospace;font-size:1.05rem;color:#00ff88;word-break:break-all;flex:1;letter-spacing:2px;text-shadow:0 0 10px rgba(0,255,136,.5)}
  .copy-btn{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:4px;padding:7px 14px;color:#00ff88;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.75rem;transition:.2s;white-space:nowrap;margin-left:12px}
  .copy-btn:hover{background:rgba(0,255,136,.2)}
  .copy-btn.copied{color:#fff;background:rgba(0,255,136,.3)}
  .strength-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.05);margin-bottom:8px;overflow:hidden}
  .strength-fill{height:100%;border-radius:2px;transition:all .4s cubic-bezier(.34,1.56,.64,1);width:0%}
  .strength-label{font-size:.72rem;font-family:'JetBrains Mono',monospace;margin-bottom:20px;color:rgba(255,255,255,.5)}
  .section-label{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
  .slider-wrap{margin-bottom:20px}
  .slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .slider-val{font-family:'JetBrains Mono',monospace;color:#00ff88;font-size:1.1rem;font-weight:700}
  input[type=range]{width:100%;-webkit-appearance:none;height:3px;border-radius:2px;background:rgba(0,255,136,.15);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:2px;background:#00ff88;cursor:pointer;box-shadow:0 0 10px rgba(0,255,136,.6)}
  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
  .toggle-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:4px;padding:10px 14px;cursor:pointer;transition:.2s}
  .toggle-item:hover{border-color:rgba(0,255,136,.2)}
  .toggle-item.on{border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.05)}
  .toggle-name{font-size:.8rem;color:rgba(255,255,255,.6)}
  .toggle-sw{width:30px;height:16px;background:rgba(255,255,255,.1);border-radius:8px;position:relative;transition:.3s}
  .toggle-item.on .toggle-sw{background:rgba(0,255,136,.4)}
  .toggle-sw::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.3s}
  .toggle-item.on .toggle-sw::after{left:16px;background:#00ff88}
  .gen-btn{width:100%;background:linear-gradient(90deg,rgba(0,255,136,.15),rgba(0,255,136,.05));border:1px solid rgba(0,255,136,.4);border-radius:4px;padding:14px;color:#00ff88;font-family:'JetBrains Mono',monospace;font-size:.9rem;cursor:pointer;letter-spacing:3px;transition:.3s;text-transform:uppercase}
  .gen-btn:hover{background:rgba(0,255,136,.15);box-shadow:0 0 30px rgba(0,255,136,.15)}
  .history{margin-top:18px}
  .hist-item{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:rgba(0,255,136,.4);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:.2s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hist-item:hover{color:rgba(0,255,136,.8)}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scan"></div>
<div class="container">
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <h1>🔐 PASSWORD_GENERATOR</h1>
  <div class="sub">> Sistem enkripsi keamanan tingkat militer</div>
  <div class="pw-display">
    <div class="pw-text" id="pwText">Klik GENERATE...</div>
    <button class="copy-btn" id="copyBtn" onclick="copyPw()">COPY</button>
  </div>
  <div class="strength-bar"><div class="strength-fill" id="strFill"></div></div>
  <div class="strength-label" id="strLabel">> STATUS: BELUM DIGENERATE</div>
  <div class="section-label">Panjang Password</div>
  <div class="slider-wrap">
    <div class="slider-row"><span style="font-size:.8rem;opacity:.4;font-family:'JetBrains Mono'">8</span><span class="slider-val" id="lenVal">16</span><span style="font-size:.8rem;opacity:.4;font-family:'JetBrains Mono'">64</span></div>
    <input type="range" min="8" max="64" value="16" id="lenRange" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
  </div>
  <div class="section-label">Karakter</div>
  <div class="toggles">
    <div class="toggle-item on" id="t-upper" onclick="toggleOpt('upper',this)"><span class="toggle-name">HURUF BESAR</span><div class="toggle-sw"></div></div>
    <div class="toggle-item on" id="t-lower" onclick="toggleOpt('lower',this)"><span class="toggle-name">huruf kecil</span><div class="toggle-sw"></div></div>
    <div class="toggle-item on" id="t-num" onclick="toggleOpt('num',this)"><span class="toggle-name">123 Angka</span><div class="toggle-sw"></div></div>
    <div class="toggle-item on" id="t-sym" onclick="toggleOpt('sym',this)"><span class="toggle-name">!@# Simbol</span><div class="toggle-sw"></div></div>
  </div>
  <button class="gen-btn" onclick="generate()">[ GENERATE PASSWORD ]</button>
  <div class="history" id="histWrap" style="display:none">
    <div class="section-label" style="margin-top:16px">Riwayat</div>
    <div id="hist"></div>
  </div>
</div>
<script>
const opts={upper:true,lower:true,num:true,sym:true};
const sets={upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower:'abcdefghijklmnopqrstuvwxyz',num:'0123456789',sym:'!@#$%^&*()_+-=[]{}|;:,.<>?'};
const history=[];

function toggleOpt(k,el){
  const active=Object.values(opts).filter(Boolean).length;
  if(opts[k]&&active<=1)return;
  opts[k]=!opts[k];
  el.classList.toggle('on');
  generate();
}

function generate(){
  let chars='';
  Object.keys(opts).forEach(k=>{if(opts[k])chars+=sets[k]});
  if(!chars)return;
  const len=+document.getElementById('lenRange').value;
  let pw='';
  // Ensure one from each active set
  Object.keys(opts).forEach(k=>{if(opts[k])pw+=sets[k][~~(Math.random()*sets[k].length)]});
  for(let i=pw.length;i<len;i++)pw+=chars[~~(Math.random()*chars.length)];
  pw=pw.split('').sort(()=>Math.random()-.5).join('');
  document.getElementById('pwText').textContent=pw;
  // Strength
  let score=0;
  if(len>=12)score++;if(len>=20)score++;
  if(opts.upper)score++;if(opts.lower)score++;if(opts.num)score++;if(opts.sym)score++;
  const pct=Math.min(100,score*17);
  const fill=document.getElementById('strFill');
  const labels=['',' SANGAT LEMAH',' LEMAH',' CUKUP',' KUAT',' SANGAT KUAT',' TIDAK DAPAT DIRETAS'];
  const colors=['','#ef4444','#f97316','#eab308','#22c55e','#00ff88','#00ff88'];
  fill.style.width=pct+'%';fill.style.background=colors[score]||'#ef4444';
  document.getElementById('strLabel').textContent=`> KEKUATAN:${labels[score]||' SANGAT LEMAH'} (SKOR: ${score}/6)`;
  // History
  history.unshift(pw);if(history.length>5)history.pop();
  const histEl=document.getElementById('hist');
  histEl.innerHTML='';
  history.slice(1).forEach(h=>{const d=document.createElement('div');d.className='hist-item';d.textContent=h;d.title='Klik untuk salin';d.onclick=()=>{navigator.clipboard.writeText(h)};histEl.appendChild(d)});
  document.getElementById('histWrap').style.display=history.length>1?'block':'none';
  document.getElementById('copyBtn').textContent='COPY';document.getElementById('copyBtn').classList.remove('copied');
}

function copyPw(){
  const pw=document.getElementById('pwText').textContent;
  if(pw==='Klik GENERATE...')return;
  navigator.clipboard.writeText(pw).then(()=>{
    const btn=document.getElementById('copyBtn');btn.textContent='✓ SALIN';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('copied')},2000);
  });
}

generate();
</script>
</body>
</html>
