<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Finance Clone - USD to IDR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #202124;
            color: #e8eaed;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .widget-container {
            width: 100%;
            max-width: 450px;
        }

        .header-text {
            color: #9aa0a6;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .main-price {
            font-size: 36px;
            font-weight: normal;
            margin: 0 0 5px 0;
        }

        .currency-name {
            font-size: 20px;
            color: #9aa0a6;
        }

        .timestamp {
            font-size: 12px;
            color: #9aa0a6;
            margin-bottom: 20px;
        }

        /* Area Grafik */
        .chart-container {
            width: 100%;
            height: 200px;
            margin-bottom: 30px;
            border-bottom: 1px solid #3c4043;
            padding-bottom: 10px;
        }

        /* Kotak Input */
        .input-group {
            display: flex;
            background-color: #202124;
            border: 1px solid #5f6368;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .input-group input {
            background-color: transparent;
            border: none;
            color: #e8eaed;
            font-size: 16px;
            padding: 15px;
            flex-grow: 1;
            width: 50%;
            outline: none;
        }

        .input-group select {
            background-color: transparent;
            border: none;
            border-left: 1px solid #5f6368;
            color: #e8eaed;
            font-size: 14px;
            padding: 15px;
            width: 50%;
            outline: none;
            cursor: pointer;
            appearance: none;
        }

        .input-group:focus-within {
            border-color: #8ab4f8;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header-text">1 Dolar Amerika Serikat sama dengan</div>
        <h1 class="main-price"><span id="display-rate">...</span> <span class="currency-name">Rupiah</span></h1>
        <div class="timestamp" id="timestamp-text">Memuat data API...</div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div class="input-group">
            <input type="number" id="input-usd" value="1" min="0">
            <select disabled>
                <option>Dolar Amerika Serikat</option>
            </select>
        </div>

        <div class="input-group">
            <input type="number" id="input-idr" value="0" min="0">
            <select disabled>
                <option>Rupiah Indonesia</option>
            </select>
        </div>
    </div>

    <script>
        // Konfigurasi API APILayer (Live)
        var myHeaders = new Headers();
        myHeaders.append("apikey", "G3XtF8VwVnWQOqtoSR9nL4X5Xh7lBKlC");

        var requestOptions = {
            method: 'GET',
            redirect: 'follow',
            headers: myHeaders
        };

        var apiUrl = "https://api.apilayer.com/currency_data/live?source=USD&currencies=IDR";
        var currentRate = 0;

        // Referensi DOM
        var displayRate = document.getElementById('display-rate');
        var inputUsd = document.getElementById('input-usd');
        var inputIdr = document.getElementById('input-idr');
        var timestampText = document.getElementById('timestamp-text');

        // Menarik data live
        fetch(apiUrl, requestOptions)
            .then(response => response.json())
            .then(result => {
                if(result.success) {
                    currentRate = result.quotes.USDIDR;
                    
                    // Update UI Teks & Input
                    displayRate.innerText = currentRate.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    inputIdr.value = currentRate.toFixed(2);

                    var date = new Date(result.timestamp * 1000);
                    timestampText.innerText = date.toLocaleString('id-ID', { dateStyle: 'long', timeStyle: 'short' }) + " UTC · Data Live · Penafian";

                    // Menggambar grafik setelah mendapatkan harga live
                    drawChart(currentRate);
                } else {
                    displayRate.innerText = "Error API";
                }
            })
            .catch(error => console.log('error', error));

        // Kalkulator Interaktif
        inputUsd.addEventListener('input', function() {
            var usdValue = parseFloat(this.value) || 0;
            inputIdr.value = (usdValue * currentRate).toFixed(2);
        });

        inputIdr.addEventListener('input', function() {
            var idrValue = parseFloat(this.value) || 0;
            inputUsd.value = (idrValue / currentRate).toFixed(5);
        });

        // Fungsi Menggambar Grafik
        function drawChart(livePrice) {
            var ctx = document.getElementById('myChart').getContext('2d');
            
            // DATA SIMULASI (Dummy Data) agar grafik terbentuk tanpa API berbayar
            var labels = ["12 Mei", "16 Mei", "21 Mei", "26 Mei", "31 Mei", "5 Jun", "10 Jun", "Hari Ini"];
            // Harga direkayasa agar terlihat seperti tren naik, dengan titik terakhir adalah harga asli dari API
            var dataPoints = [16050, 16120, 16080, 16200, 16250, 16210, 16300, livePrice];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataPoints,
                        borderColor: '#81c995', // Warna hijau Google Finance
                        borderWidth: 2,
                        pointRadius: 0, // Menghilangkan titik lingkaran pada garis
                        pointHoverRadius: 4,
                        fill: true,
                        backgroundColor: 'rgba(129, 201, 149, 0.1)', // Efek gradien hijau transparan di bawah garis
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false }, // Hilangkan garis vertikal
                            ticks: { color: '#9aa0a6', maxTicksLimit: 4 }
                        },
                        y: {
                            position: 'right', // Posisi harga di kanan
                            grid: { color: '#3c4043', drawBorder: false }, // Garis horizontal abu-abu gelap
                            ticks: { color: '#9aa0a6' }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return " Rp " + context.parsed.y.toLocaleString('id-ID');
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }
    </script>
</body>
</html>
