<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Chord & Lirik</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1e293b; padding: 15px 20px; text-align: center; border-bottom: 1px solid #334155; }
        .header h2 { font-size: 1.2rem; font-weight: 600; }
        
        /* Menu Navigasi (4 Menu) */
        .nav-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; white-space: nowrap; }
        .nav-link { flex: 1; text-align: center; padding: 12px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; min-width: 80px; }
        .nav-link.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: #0f172a; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .input-group { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        input[type="text"] { width: 100%; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.95rem; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        button { background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        /* Area hasil menggunakan font monospace agar letak chord gitar presisi/sejajar dengan lirik */
        .result-area { width: 100%; max-width: 500px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-size: 0.9rem; line-height: 1.8; display: none; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace; overflow-x: auto; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="nav-link">💬 Asisten</a>
        <a href="gambar.html" class="nav-link">🎨 Gambar</a>
        <a href="konten.html" class="nav-link">📱 Konten</a>
        <a href="chord.html" class="nav-link active">🎸 Chord</a>
    </div>

    <div class="main-content">
        <div class="input-group">
            <input type="text" id="judulLagu" placeholder="Contoh: Diary Depresiku - Last Child" onkeypress="handleEnter(event)">
            <button id="generateBtn" onclick="cariChord()">Cari Chord</button>
        </div>

        <div id="statusText" style="color: #94a3b8; display: none; margin-bottom: 15px; font-style: italic;">Sedang mengulik chord...</div>
        
        <pre class="result-area" id="resultArea"></pre>
    </div>

    <script>
        function handleEnter(event) {
            if (event.key === 'Enter') cariChord();
        }

        async function cariChord() {
            const judulLagu = document.getElementById('judulLagu').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const statusText = document.getElementById('statusText');
            const resultArea = document.getElementById('resultArea');

            if (!judulLagu) {
                alert("Masukkan judul lagu dan penyanyinya dulu.");
                return;
            }

            generateBtn.disabled = true;
            statusText.style.display = 'block';
            resultArea.style.display = 'none';

            const bagian1 = "AQ.Ab8RN6I17XNIEcT7Mx2C"; 
            const bagian2 = "mRe7UxYMdK9xqGAfsImM-nLsqCNr1g";
            const API_KEY = bagian1 + bagian2;

            // Memaksa AI menjadi musisi yang hanya memberikan chord dan lirik rapi
            const promptSistem = `Kamu adalah musisi ahli pembuat chord gitar. Berikan lirik lagu lengkap berserta chord dasar untuk lagu "${judulLagu}". 
            Aturan ketat: 
            1. Posisikan chord persis di atas kata yang dinyanyikan.
            2. Gunakan chord dasar yang mudah dimainkan.
            3. Jangan berikan kalimat pembuka atau penutup, langsung berikan teks [Intro], [Verse], [Chorus], dst beserta chordnya.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptSistem }] }] })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || "Terjadi kesalahan server.");
                }
                
                resultArea.innerText = data.candidates[0].content.parts[0].text;
                resultArea.style.display = 'block';
                
            } catch (error) {
                resultArea.innerText = "Sistem Error: " + error.message;
                resultArea.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                statusText.style.display = 'none';
            }
        }
    </script>
</body>
</html>
