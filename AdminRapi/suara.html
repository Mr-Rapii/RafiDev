<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Studio Voiceover</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1e293b; padding: 15px 20px; text-align: center; border-bottom: 1px solid #334155; }
        .header h2 { font-size: 1.2rem; font-weight: 600; }
        
        /* Menu Navigasi (7 Menu, Scroll ke Samping) */
        .nav-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; white-space: nowrap; padding-bottom: 2px;}
        .nav-link { flex: 1; text-align: center; padding: 12px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; min-width: 80px; }
        .nav-link.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: #0f172a; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .tool-container { width: 100%; max-width: 500px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        textarea { width: 100%; height: 120px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.95rem; resize: none; outline: none; }
        textarea:focus { border-color: #3b82f6; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #94a3b8; font-weight: bold; }
        
        select, input[type="range"] { width: 100%; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 6px; padding: 10px; outline: none; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; border: none; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: opacity 0.3s; color: white; }
        button:active { opacity: 0.8; }
        
        .btn-play { background: #3b82f6; }
        .btn-stop { background: #ef4444; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="nav-link">💬 Asisten</a>
        <a href="gambar.html" class="nav-link">🎨 Gambar</a>
        <a href="konten.html" class="nav-link">📱 Konten</a>
        <a href="chord.html" class="nav-link">🎸 Chord</a>
        <a href="tiktok.html" class="nav-link">🎵 TikTok</a>
        <a href="teks.html" class="nav-link">✨ Teks</a>
        <a href="suara.html" class="nav-link active">🎙️ Suara</a>
    </div>

    <div class="main-content">
        <div class="tool-container">
            
            <textarea id="textToSpeak" placeholder="Ketik naskah voiceover kamu di sini..."></textarea>
            
            <div class="control-group">
                <label for="voiceSelect">Pilih Suara (Tergantung HP):</label>
                <select id="voiceSelect"></select>
            </div>

            <div class="control-group">
                <label for="rateSlider">Kecepatan Bicara: <span id="rateVal">1.0</span></label>
                <input type="range" id="rateSlider" min="0.5" max="2" value="1" step="0.1" oninput="document.getElementById('rateVal').innerText = this.value">
            </div>

            <div class="control-group">
                <label for="pitchSlider">Nada Suara (Pitch): <span id="pitchVal">1.0</span></label>
                <input type="range" id="pitchSlider" min="0.5" max="2" value="1" step="0.1" oninput="document.getElementById('pitchVal').innerText = this.value">
            </div>

            <div class="btn-container">
                <button class="btn-play" onclick="playAudio()">▶️ Putar</button>
                <button class="btn-stop" onclick="stopAudio()">⏹️ Berhenti</button>
            </div>

        </div>
    </div>

    <script>
        const voiceSelect = document.getElementById('voiceSelect');
        let voices = [];

        // Mengambil daftar mesin suara yang terpasang di HP kamu
        function populateVoiceList() {
            voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            
            // Mengutamakan suara Bahasa Indonesia jika ada
            voices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = i;
                
                if (voice.lang.includes('id') || voice.lang.includes('ID')) {
                    option.selected = true; // Otomatis pilih bahasa Indonesia
                }
                
                voiceSelect.appendChild(option);
            });
        }

        // Pemicu untuk memuat daftar suara (berbeda tiap browser)
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function playAudio() {
            const text = document.getElementById('textToSpeak').value.trim();
            if (text === '') return;

            // Hentikan suara yang sedang berjalan sebelum memulai yang baru
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Mengambil pengaturan dari antarmuka
            const selectedOption = voiceSelect.selectedOptions[0].value;
            utterance.voice = voices[selectedOption];
            utterance.rate = document.getElementById('rateSlider').value;
            utterance.pitch = document.getElementById('pitchSlider').value;

            speechSynthesis.speak(utterance);
        }

        function stopAudio() {
            speechSynthesis.cancel();
        }
    </script>
</body>
</html>
