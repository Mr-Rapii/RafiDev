<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - TikTok Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1e293b; padding: 15px 20px; text-align: center; border-bottom: 1px solid #334155; }
        .header h2 { font-size: 1.2rem; font-weight: 600; }
        
        /* Menu Navigasi Diperbarui (5 Menu) */
        .nav-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; white-space: nowrap; }
        .nav-link { flex: 1; text-align: center; padding: 12px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; min-width: 80px; }
        .nav-link.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: #0f172a; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .input-group { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        input[type="text"] { width: 100%; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.95rem; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        button { background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        /* Area Hasil Unduhan */
        .result-area { width: 100%; max-width: 500px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; display: none; flex-direction: column; gap: 15px; align-items: center; text-align: center; margin-bottom: 20px; }
        .result-area img { width: 100%; max-width: 200px; border-radius: 8px; }
        .video-title { font-size: 0.95rem; color: #cbd5e1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn-container { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .download-video { background: #10b981; color: white; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .download-video:hover { background: #059669; }
        .download-audio { background: #f59e0b; color: white; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .download-audio:hover { background: #d97706; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="nav-link">💬 Asisten</a>
        <a href="gambar.html" class="nav-link">🎨 Gambar</a>
        <a href="konten.html" class="nav-link">📱 Konten</a>
        <a href="chord.html" class="nav-link">🎸 Chord</a>
        <a href="tiktok.html" class="nav-link active">🎵 TikTok</a>
    </div>

    <div class="main-content">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Tempel link video TikTok di sini..." onkeypress="handleEnter(event)">
            <button id="searchBtn" onclick="cariVideo()">Cari Video</button>
        </div>

        <div id="statusText" style="color: #94a3b8; display: none; margin-bottom: 15px;">Menghubungkan ke server...</div>
        
        <div class="result-area" id="resultArea">
            <img id="thumbImage" src="" alt="Thumbnail Video">
            <div class="video-title" id="videoTitle">Judul Video</div>
            <div class="btn-container">
                <a id="btnVideo" class="download-video" href="#" target="_blank">⬇️ Download Video (No Watermark)</a>
                <a id="btnAudio" class="download-audio" href="#" target="_blank">🎵 Download Audio (MP3)</a>
            </div>
        </div>
    </div>

    <script>
        function handleEnter(event) {
            if (event.key === 'Enter') cariVideo();
        }

        async function cariVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const searchBtn = document.getElementById('searchBtn');
            const statusText = document.getElementById('statusText');
            const resultArea = document.getElementById('resultArea');
            
            // Elemen hasil
            const thumbImage = document.getElementById('thumbImage');
            const videoTitle = document.getElementById('videoTitle');
            const btnVideo = document.getElementById('btnVideo');
            const btnAudio = document.getElementById('btnAudio');

            if (!urlInput.includes("tiktok.com")) {
                alert("Masukkan link TikTok yang valid.");
                return;
            }

            searchBtn.disabled = true;
            statusText.style.display = 'block';
            statusText.innerText = "Mengekstrak data dari TikTok...";
            resultArea.style.display = 'none';

            // Menggunakan API publik gratis dari TikWM (tanpa API Key)
            const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.code !== 0) {
                    throw new Error("Video tidak ditemukan atau bersifat privat.");
                }

                // Menampilkan data ke antarmuka
                thumbImage.src = data.data.cover;
                videoTitle.innerText = data.data.title || "Video TikTok";
                
                // Menyiapkan link unduhan (URL utama API + path file)
                const baseUrl = "https://www.tikwm.com";
                btnVideo.href = baseUrl + data.data.play;
                btnAudio.href = baseUrl + data.data.music;

                resultArea.style.display = 'flex';

            } catch (error) {
                alert("Sistem Error: " + error.message);
            } finally {
                searchBtn.disabled = false;
                statusText.style.display = 'none';
            }
        }
    </script>
</body>
</html>
