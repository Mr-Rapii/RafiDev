<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapii AI - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full px-6">
    <div class="text-center mb-12">
      <h1 class="text-6xl font-bold text-emerald-400 mb-2">RAPII</h1>
      <p class="text-2xl text-zinc-400">AI Followers Exchange</p>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-10 text-center">
      <i class="fas fa-user-circle text-7xl text-emerald-500 mb-6"></i>
      <h2 class="text-2xl font-semibold mb-8">Login untuk Melanjutkan</h2>
      
      <button onclick="loginWithGoogle()" 
        class="w-full bg-white text-black py-5 rounded-2xl text-lg font-medium flex items-center justify-center gap-3 hover:bg-gray-100">
        <i class="fab fa-google text-xl"></i>
        Login dengan Gmail
      </button>

      <p class="text-xs text-zinc-500 mt-8">
        Dengan login, kamu setuju dengan Syarat & Ketentuan
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBJJjcICAkbVWjrw5-zYMzcKqPGhS0nS0I",
      authDomain: "piwstore.firebaseapp.com",
      projectId: "piwstore",
      storageBucket: "piwstore.firebasestorage.app",
      messagingSenderId: "419258630997",
      appId: "1:419258630997:web:aefc0e34cc4b7ca16d25dc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    }

    // Redirect ke dashboard setelah login
    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });
  </script>
</body>
</html>
