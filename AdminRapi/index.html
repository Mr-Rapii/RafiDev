<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Personal</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 100px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; margin-top: 10px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background: #1e293b; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Asisten AI</h2>
    <textarea id="prompt" placeholder="Tanyakan sesuatu..."></textarea>
    <button onclick="askAI()">Kirim</button>
    <div id="output">Hasil akan muncul di sini...</div>
</div>

<script>
    async function askAI() {
        const prompt = document.getElementById('prompt').value;
        const output = document.getElementById('output');
        const API_KEY = "AQ.Ab8RN6JeZBWiT-XRgn-gwR_-DPQPZTudA9i8nm5SPVBDvTvwHA"; 
        
        output.innerText = "Berpikir...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            output.innerText = data.candidates[0].content.parts[0].text;
        } catch (error) {
            output.innerText = "Error: Pastikan API Key benar.";
        }
    }
</script>
</body>
</html>
