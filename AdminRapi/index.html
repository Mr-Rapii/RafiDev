<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Personal</title>
    <style>
        /* Reset Dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Bagian Header / Judul Atas */
        .header { 
            background: #1e293b; 
            padding: 15px 20px; 
            text-align: center; 
            border-bottom: 1px solid #334155; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        .header h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }

        /* Area Percakapan Utama */
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        /* Desain Gelembung Teks (Chat Bubbles) */
        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            word-wrap: break-word; 
        }
        .user-msg { 
            background: #3b82f6; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        .ai-msg { 
            background: #1e293b; 
            border: 1px solid #334155; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            white-space: pre-wrap; 
        }
        
        /* Indikator Animasi "Berpikir" */
        .typing { 
            align-self: flex-start; 
            color: #94a3b8; 
            font-size: 0.85rem; 
            font-style: italic; 
            display: none; 
            padding: 0 20px;
        }

        /* Area Input Teks di Bawah */
        .input-area { 
            background: #1e293b; 
            padding: 15px; 
            border-top: 1px solid #334155; 
            display: flex; 
            gap: 10px; 
        }
        input[type="text"] { 
            flex: 1; 
            background: #0f172a; 
            color: white; 
            border: 1px solid #334155; 
            border-radius: 20px; 
            padding: 12px 20px; 
            font-size: 0.95rem; 
            outline: none; 
            transition: border 0.3s; 
        }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        /* Tombol Kirim Melingkar */
        button { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: background 0.3s; 
        }
        button:hover { background: #2563eb; }
        button svg { width: 20px; height: 20px; fill: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="message ai-msg">Halo! Saya siap membantu. Apa yang ingin kamu diskusikan hari ini?</div>
    </div>
    <div class="typing" id="typingIndicator">AI sedang berpikir...</div>

    <div class="input-area">
        <input type="text" id="prompt" placeholder="Ketik pesan di sini..." onkeypress="handleEnter(event)">
        <button onclick="askAI()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const typingIndicator = document.getElementById('typingIndicator');
        const promptInput = document.getElementById('prompt');

        // Fungsi untuk menambahkan chat bubble ke layar
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'ai-msg');
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Otomatis scroll ke bawah
        }

        // Fitur mengirim pesan dengan menekan tombol Enter di keyboard
        function handleEnter(event) {
            if (event.key === 'Enter') askAI();
        }

        async function askAI() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Memunculkan pesan yang kamu ketik ke layar
            appendMessage(prompt, 'user');
            promptInput.value = ''; 
            
            // Memunculkan tulisan "AI sedang berpikir..."
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            // API Key yang sudah dipecah (menggunakan kuncimu)
            const bagian1 = "AQ.Ab8RN6I17XNIEcT7Mx2C"; 
            const bagian2 = "mRe7UxYMdK9xqGAfsImM-nLsqCNr1g";
            const API_KEY = bagian1 + bagian2;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none'; // Sembunyikan indikator berpikir
                
                if (!response.ok) {
                    appendMessage("Pesan Error: " + (data.error?.message || "Akses ditolak."), 'ai');
                    return;
                }
                
                // Menampilkan balasan AI
                appendMessage(data.candidates[0].content.parts[0].text, 'ai');
                
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Sistem Error: " + error.message, 'ai');
            }
        }
    </script>
</body>
</html>
