<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Personal</title>
    <style>
        /* Reset Dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        .header { 
            background: #1e293b; 
            padding: 15px 20px; 
            text-align: center; 
            border-bottom: 1px solid #334155; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        .header h2 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            word-wrap: break-word; 
            position: relative;
        }
        .user-msg { 
            background: #3b82f6; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        .ai-msg { 
            background: #1e293b; 
            border: 1px solid #334155; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            white-space: pre-wrap; 
        }
        
        /* Desain Khusus Tombol Suara (TTS) */
        .tts-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
            transition: color 0.3s;
        }
        .tts-btn:hover { color: #3b82f6; }

        .typing { 
            align-self: flex-start; 
            color: #94a3b8; 
            font-size: 0.85rem; 
            font-style: italic; 
            display: none; 
            padding: 0 20px;
        }

        .input-area { 
            background: #1e293b; 
            padding: 15px; 
            border-top: 1px solid #334155; 
            display: flex; 
            gap: 10px; 
        }
        input[type="text"] { 
            flex: 1; 
            background: #0f172a; 
            color: white; 
            border: 1px solid #334155; 
            border-radius: 20px; 
            padding: 12px 20px; 
            font-size: 0.95rem; 
            outline: none; 
            transition: border 0.3s; 
        }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        .btn-kirim { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: background 0.3s; 
        }
        .btn-kirim:hover { background: #2563eb; }
        .btn-kirim svg { width: 20px; height: 20px; fill: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>

    <div class="chat-container" id="chatBox">
        </div>
    <div class="typing" id="typingIndicator">AI sedang berpikir...</div>

    <div class="input-area">
        <input type="text" id="prompt" placeholder="Ketik pesan di sini..." onkeypress="handleEnter(event)">
        <button class="btn-kirim" onclick="askAI()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const typingIndicator = document.getElementById('typingIndicator');
        const promptInput = document.getElementById('prompt');

        // Fungsi Membacakan Teks (Text-to-Speech)
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // Hentikan suara sebelumnya jika tombol ditekan berulang kali
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID'; // Setel logat ke Bahasa Indonesia
                utterance.rate = 1.0; // Kecepatan bicara (normal)
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Browser HP kamu tidak mendukung fitur Text-to-Speech.");
            }
        }

        // Fungsi menampilkan pesan ke layar
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'ai-msg');
            
            if (sender === 'ai') {
                // Teks AI
                const textSpan = document.createElement('span');
                textSpan.innerText = text;
                msgDiv.appendChild(textSpan);
                
                // Tambahkan enter / baris baru
                msgDiv.appendChild(document.createElement('br'));

                // Tombol Suara
                const speakBtn = document.createElement('button');
                speakBtn.innerText = '🔊 Dengarkan';
                speakBtn.classList.add('tts-btn');
                speakBtn.onclick = () => speakText(text);
                msgDiv.appendChild(speakBtn);
            } else {
                msgDiv.innerText = text;
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') askAI();
        }

        async function askAI() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            appendMessage(prompt, 'user');
            promptInput.value = ''; 
            
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const bagian1 = "AQ.Ab8RN6I17XNIEcT7Mx2C"; 
            const bagian2 = "mRe7UxYMdK9xqGAfsImM-nLsqCNr1g";
            const API_KEY = bagian1 + bagian2;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none'; 
                
                if (!response.ok) {
                    appendMessage("Pesan Error: " + (data.error?.message || "Akses ditolak."), 'ai');
                    return;
                }
                
                appendMessage(data.candidates[0].content.parts[0].text, 'ai');
                
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Sistem Error: " + error.message, 'ai');
            }
        }
    </script>
</body>
</html>
