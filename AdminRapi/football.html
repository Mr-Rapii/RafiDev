<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raffi | AI Hub & Portfolio</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        
        .nav { padding: 20px; background: #1e293b; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .page { display: none; padding: 20px; max-width: 600px; margin: auto; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .back-btn { background: #475569; }
        .match-card { background: var(--card); padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <nav><strong>RAFFI HUB</strong></nav>

    <div id="home" class="page active">
        <h1>Dashboard</h1>
        <div class="grid">
            <div class="card" onclick="showPage('football')">⚽ Info Bola</div>
        </div>
    </div>

    <div id="football" class="page">
        <button class="back-btn" onclick="showPage('home')">← Kembali</button>
        <h2>Jadwal Persib</h2>
        <button onclick="cekBola()">Lihat Jadwal Terbaru</button>
        <div id="bola-result"></div>
    </div>

    <script>
        // MASUKKAN API KEY KAMU DI SINI
        const API_KEY = 'v3.football.api-sports.io';
        const TEAM_ID = '1432';

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        async function cekBola() {
            const result = document.getElementById('bola-result');
            result.innerHTML = "Sedang mengambil data...";
            
            try {
                const response = await fetch(`https://v3.football.api-sports.io/fixtures?team=${TEAM_ID}&next=3`, {
                    headers: { 'x-apisports-key': API_KEY }
                });
                const data = await response.json();
                
                if (data.response && data.response.length > 0) {
                    result.innerHTML = "";
                    data.response.forEach(match => {
                        const date = new Date(match.fixture.date).toLocaleDateString('id-ID');
                        result.innerHTML += `
                            <div class="match-card">
                                <b>${match.teams.home.name} vs ${match.teams.away.name}</b><br>
                                📅 ${date} | 🏟️ ${match.fixture.venue.name}
                            </div>
                        `;
                    });
                } else {
                    result.innerHTML = "<p>Jadwal belum tersedia.</p>";
                }
            } catch (error) {
                result.innerHTML = "<p>Gagal mengambil data. Pastikan API Key benar.</p>";
            }
        }
    </script>
</body>
</html>
