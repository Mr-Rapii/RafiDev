<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Teks Estetik</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1e293b; padding: 15px 20px; text-align: center; border-bottom: 1px solid #334155; }
        .header h2 { font-size: 1.2rem; font-weight: 600; }
        
        /* Menu Navigasi Diperbarui (6 Menu, bisa di-scroll ke samping) */
        .nav-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; white-space: nowrap; }
        .nav-link { flex: 1; text-align: center; padding: 12px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; min-width: 80px; }
        .nav-link.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: #0f172a; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .input-group { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        input[type="text"] { width: 100%; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.95rem; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        /* Desain Grid Hasil Teks */
        .result-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 500px; }
        .text-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: border 0.3s; }
        .text-card:hover { border-color: #3b82f6; }
        
        .text-output { font-size: 1.1rem; color: #f8fafc; word-break: break-all; }
        .copy-btn { background: #3b82f6; color: white; border: none; border-radius: 6px; padding: 8px 15px; font-size: 0.85rem; font-weight: bold; cursor: pointer; min-width: 70px; }
        .copy-btn:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="nav-link">💬 Asisten</a>
        <a href="gambar.html" class="nav-link">🎨 Gambar</a>
        <a href="konten.html" class="nav-link">📱 Konten</a>
        <a href="chord.html" class="nav-link">🎸 Chord</a>
        <a href="tiktok.html" class="nav-link">🎵 TikTok</a>
        <a href="teks.html" class="nav-link active">✨ Teks</a>
    </div>

    <div class="main-content">
        <div class="input-group">
            <input type="text" id="textInput" placeholder="Contoh: Raffi Rusher" oninput="generateStyles()">
        </div>

        <div class="result-grid" id="resultGrid">
            </div>
    </div>

    <script>
        // Array pemetaan karakter standar ke karakter Unicode estetik
        const chars = Array.from('abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ');
        const doubleStruck = Array.from('𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ');
        const fraktur = Array.from('𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷𝔄𝔅ℭ𝔇𝔈𝔉𝔊ℌℑ𝔍𝔎𝔏𝔐𝔑𝔒𝔓𝔔ℜ𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ');
        const cursive = Array.from('𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩');

        // Fungsi mengubah huruf biasa menjadi huruf estetik
        function convertText(text, targetArray) {
            let res = '';
            for(let c of text) {
                let idx = chars.indexOf(c);
                res += (idx !== -1) ? targetArray[idx] : c;
            }
            return res;
        }

        // Fungsi utama yang berjalan otomatis setiap kali kamu mengetik
        function generateStyles() {
            const input = document.getElementById('textInput').value.trim();
            const grid = document.getElementById('resultGrid');
            grid.innerHTML = ''; 

            if(!input) return;

            // Meracik berbagai variasi gaya font dan dekorasi simbol
            const results = [
                convertText(input, doubleStruck),
                convertText(input, fraktur),
                convertText(input, cursive),
                `꧁༺ ${input} ༻꧂`,
                `『 ${input} 』亗`,
                `×͜× ${input} ☠︎︎`,
                `★彡 ${input} 彡★`
            ];

            // Mencetak kotak-kotak hasil ke layar HP
            results.forEach(text => {
                // Memastikan teks yang mengandung tanda kutip aman saat diproses JavaScript
                const safeText = text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                grid.innerHTML += `
                    <div class="text-card">
                        <div class="text-output">${text}</div>
                        <button class="copy-btn" onclick="copyText(this, '${safeText}')">Salin</button>
                    </div>
                `;
            });
        }

        // Fungsi menyalin ke clipboard HP
        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = '✅';
                setTimeout(() => { btn.innerText = oldText; }, 1500);
            });
        }
    </script>
</body>
</html>
