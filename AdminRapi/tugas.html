<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Manajer Tugas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1e293b; padding: 15px 20px; text-align: center; border-bottom: 1px solid #334155; }
        .header h2 { font-size: 1.2rem; font-weight: 600; }
        
        /* Menu Navigasi (10 Menu, Scroll ke Samping) */
        .nav-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; white-space: nowrap; padding-bottom: 2px;}
        .nav-link { flex: 1; text-align: center; padding: 12px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; min-width: 80px; }
        .nav-link.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: #0f172a; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .tool-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.95rem; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        button.btn-add { background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 0 20px; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button.btn-add:hover { background: #2563eb; }
        
        /* Daftar Tugas */
        .task-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .task-item { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: opacity 0.3s; }
        
        .task-content { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .checkbox { width: 20px; height: 20px; border: 2px solid #3b82f6; border-radius: 4px; display: flex; justify-content: center; align-items: center; }
        .checkbox.checked { background: #3b82f6; }
        .checkbox.checked::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        
        .task-text { font-size: 0.95rem; color: #f8fafc; word-break: break-word; }
        .task-text.completed { text-decoration: line-through; color: #64748b; }
        
        button.btn-delete { background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer; padding: 5px; }
        button.btn-delete:hover { color: #dc2626; }

        .empty-state { text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="nav-link">💬 Asisten</a>
        <a href="gambar.html" class="nav-link">🎨 Gambar</a>
        <a href="konten.html" class="nav-link">📱 Konten</a>
        <a href="chord.html" class="nav-link">🎸 Chord</a>
        <a href="tiktok.html" class="nav-link">🎵 TikTok</a>
        <a href="teks.html" class="nav-link">✨ Teks</a>
        <a href="suara.html" class="nav-link">🎙️ Suara</a>
        <a href="qr.html" class="nav-link">🔳 QR Code</a>
        <a href="penghitung.html" class="nav-link">📝 Penghitung</a>
        <a href="tugas.html" class="nav-link active">✅ Tugas</a>
    </div>

    <div class="main-content">
        <div class="tool-container">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Tambahkan ide atau tugas baru..." onkeypress="handleEnter(event)">
                <button class="btn-add" onclick="tambahTugas()">+</button>
            </div>
            
            <div class="task-list" id="taskList">
                </div>
        </div>
    </div>

    <script>
        // Mengambil data dari memori browser saat halaman dimuat
        let daftarTugas = JSON.parse(localStorage.getItem('aiHubTasks')) || [];

        function handleEnter(event) {
            if (event.key === 'Enter') tambahTugas();
        }

        function simpanData() {
            localStorage.setItem('aiHubTasks', JSON.stringify(daftarTugas));
            renderTugas();
        }

        function tambahTugas() {
            const input = document.getElementById('taskInput');
            const teks = input.value.trim();
            
            if (!teks) return;

            daftarTugas.unshift({ id: Date.now(), teks: teks, selesai: false });
            input.value = '';
            simpanData();
        }

        function toggleTugas(id) {
            const tugas = daftarTugas.find(t => t.id === id);
            if (tugas) {
                tugas.selesai = !tugas.selesai;
                simpanData();
            }
        }

        function hapusTugas(id) {
            daftarTugas = daftarTugas.filter(t => t.id !== id);
            simpanData();
        }

        function renderTugas() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (daftarTugas.length === 0) {
                list.innerHTML = '<div class="empty-state">Belum ada tugas. Tambahkan sesuatu!</div>';
                return;
            }

            daftarTugas.forEach(tugas => {
                const item = document.createElement('div');
                item.className = 'task-item';
                
                item.innerHTML = `
                    <div class="task-content" onclick="toggleTugas(${tugas.id})">
                        <div class="checkbox ${tugas.selesai ? 'checked' : ''}"></div>
                        <div class="task-text ${tugas.selesai ? 'completed' : ''}">${tugas.teks}</div>
                    </div>
                    <button class="btn-delete" onclick="hapusTugas(${tugas.id})">🗑️</button>
                `;
                list.appendChild(item);
            });
        }

        // Render pertama kali saat aplikasi dibuka
        renderTugas();
    </script>
</body>
</html>
