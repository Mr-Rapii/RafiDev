<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Generator Konten</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #1e293b; padding: 15px 20px; text-align: center; border-bottom: 1px solid #334155; }
        .header h2 { font-size: 1.2rem; font-weight: 600; }
        
        .nav-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
        .nav-link { flex: 1; text-align: center; padding: 12px; color: #94a3b8; text-decoration: none; font-size: 0.95rem; }
        .nav-link.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: #0f172a; font-weight: bold; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .input-group { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        label { font-size: 0.9rem; color: #94a3b8; margin-bottom: -5px; }
        input[type="text"] { width: 100%; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 0.95rem; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        
        button { background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .result-area { width: 100%; max-width: 500px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; display: none; margin-bottom: 20px;}
        
        .action-btn { background: #10b981; color: white; border: none; border-radius: 8px; padding: 10px; width: 100%; max-width: 500px; font-weight: bold; cursor: pointer; display: none; margin-top: -10px; margin-bottom: 20px;}
        .action-btn:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🤖 AI Hub Personal</h2>
    </div>
    
    <div class="nav-bar">
        <a href="index.html" class="nav-link">💬 Asisten</a>
        <a href="gambar.html" class="nav-link">🎨 Gambar</a>
        <a href="konten.html" class="nav-link active">📱 Konten</a>
    </div>

    <div class="main-content">
        <div class="input-group">
            <label for="topik">Topik Video / Tutorial:</label>
            <input type="text" id="topik" placeholder="Contoh: Cara edit jedag-jedug di CapCut">
            
            <label for="platform">Platform Utama:</label>
            <input type="text" id="platform" placeholder="Contoh: TikTok / YouTube Short">
            
            <button id="generateBtn" onclick="buatSEO()">Mulai Generate</button>
        </div>

        <div id="statusText" style="color: #94a3b8; display: none; margin-bottom: 15px;">Bot Rapi sedang meracik ide...</div>
        
        <div class="result-area" id="resultArea"></div>
        <button id="copyBtn" class="action-btn" onclick="salinTeks()">📋 Salin Semua Hasil</button>
    </div>

    <script>
        async function buatSEO() {
            const topik = document.getElementById('topik').value.trim();
            const platform = document.getElementById('platform').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const statusText = document.getElementById('statusText');
            const resultArea = document.getElementById('resultArea');
            const copyBtn = document.getElementById('copyBtn');

            if (!topik || !platform) {
                alert("Harap isi topik dan platform terlebih dahulu.");
                return;
            }

            generateBtn.disabled = true;
            statusText.style.display = 'block';
            resultArea.style.display = 'none';
            copyBtn.style.display = 'none';

            // Memanggil API Key aslimu
            const bagian1 = "AQ.Ab8RN6I17XNIEcT7Mx2C"; 
            const bagian2 = "mRe7UxYMdK9xqGAfsImM-nLsqCNr1g";
            const API_KEY = bagian1 + bagian2;

            // Prompt tersembunyi yang "memaksa" AI menjadi ahli SEO
            const promptSistem = `Kamu adalah pakar strategi media sosial. Buatkan strategi konten untuk video tentang "${topik}" di platform "${platform}". 
            Berikan format berikut:
            1. 3 Ide Judul Clickbait tapi relevan.
            2. Deskripsi video singkat yang SEO-friendly.
            3. 15 Hashtag viral dan relevan.
            4. Draf singkat naskah/voiceover (maksimal 3 paragraf).`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptSistem }] }] })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error?.message || "Gagal menghubungi server.");
                
                resultArea.innerText = data.candidates[0].content.parts[0].text;
                resultArea.style.display = 'block';
                copyBtn.style.display = 'block';
                
            } catch (error) {
                resultArea.innerText = "Sistem Error: " + error.message;
                resultArea.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                statusText.style.display = 'none';
            }
        }

        function salinTeks() {
            const textToCopy = document.getElementById('resultArea').innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ Berhasil Disalin!";
                setTimeout(() => { btn.innerText = "📋 Salin Semua Hasil"; }, 2000);
            });
        }
    </script>
</body>
</html>
