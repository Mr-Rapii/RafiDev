<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Rapi</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header & Nav */
        header { 
            padding: 15px 20px; background: var(--glass); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; gap: 15px; 
        }
        
        /* Tombol Kembali ke Portofolio */
        .back-btn { 
            color: var(--accent); text-decoration: none; font-size: 0.9rem; 
            background: rgba(59, 130, 246, 0.1); padding: 8px 15px; 
            border-radius: 20px; transition: 0.3s; border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .back-btn:hover { background: var(--accent); color: white; }

        /* Chat Area */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; animation: slideIn 0.3s ease-out; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Animasi Loading Berpikir */
        .typing { display: none; padding: 10px 20px; color: #94a3b8; font-size: 0.9rem; font-style: italic; }
        .dots { display: inline-block; width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite; margin: 0 2px; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Input */
        .input-area { padding: 20px; background: var(--glass); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Kembali ke Portofolio</a>
        <h3 style="margin: 0; font-size: 1rem;">Asisten Rapi</h3>
    </header>

    <div id="chatBox">
        <div class="msg ai">Halo! Saya Asisten Rapi. Ada yang bisa saya bantu hari ini?</div>
    </div>
    
    <div class="typing" id="typing">
        Berpikir <span class="dots"></span><span class="dots" style="animation-delay: 0.2s"></span><span class="dots" style="animation-delay: 0.4s"></span>
    </div>

    <div class="input-area">
        <input type="text" id="prompt" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">Kirim</button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const typing = document.getElementById('typing');
        let history = [];

        async function askAI() {
            const prompt = document.getElementById('prompt').value.trim();
            if(!prompt) return;

            const uMsg = document.createElement('div');
            uMsg.className = 'msg user'; uMsg.innerText = prompt;
            chatBox.appendChild(uMsg);
            
            document.getElementById('prompt').value = '';
            typing.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const b1 = "AQ.Ab8RN6I17XNIEcT7Mx2C"; 
            const b2 = "mRe7UxYMdK9xqGAfsImM-nLsqCNr1g";
            const KEY = b1 + b2;

            history.push({ role: "user", parts: [{ text: prompt }] });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: history })
                });
                const data = await res.json();
                typing.style.display = 'none';
                
                const aiText = data.candidates[0].content.parts[0].text;
                const aMsg = document.createElement('div');
                aMsg.className = 'msg ai'; aMsg.innerText = aiText;
                chatBox.appendChild(aMsg);
                history.push({ role: "model", parts: [{ text: aiText }] });
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) {
                typing.style.display = 'none';
                alert("Asisten sedang sibuk!");
            }
        }
    </script>
</body>
</html>
