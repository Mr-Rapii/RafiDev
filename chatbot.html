<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Asisten Rapi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--glass:rgba(30,41,59,.55);--glass2:rgba(255,255,255,.04);
  --accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;
  --text:#f8fafc;--muted:#94a3b8;--border:rgba(255,255,255,.08);
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}

/* Animated background blobs */
.bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35}
.blob1{width:380px;height:380px;background:radial-gradient(circle,#3b82f6,transparent);top:-120px;left:-80px;animation:float1 14s ease-in-out infinite}
.blob2{width:320px;height:320px;background:radial-gradient(circle,#8b5cf6,transparent);bottom:-100px;right:-60px;animation:float2 16s ease-in-out infinite}
.blob3{width:260px;height:260px;background:radial-gradient(circle,#06b6d4,transparent);top:40%;left:55%;animation:float3 18s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,80px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-60px)}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,40px) scale(1.15)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.35);border-radius:3px}

/* ===== HEADER ===== */
header{
  position:relative;z-index:2;
  padding:14px 18px;background:var(--glass);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
}
.back-btn{
  color:var(--accent3);text-decoration:none;font-size:.82rem;font-weight:600;
  background:rgba(6,182,212,.1);padding:8px 16px;
  border-radius:50px;transition:.3s;border:1px solid rgba(6,182,212,.2);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.back-btn:hover{background:var(--accent3);color:#06283a;transform:translateY(-1px)}

.header-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.bot-avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  box-shadow:0 0 0 0 rgba(59,130,246,.5);
  animation:pulse-ring 2.5s infinite;
  position:relative;
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(59,130,246,.45)}
  70%{box-shadow:0 0 0 10px rgba(59,130,246,0)}
  100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}
}
.header-text h3{
  font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;
  letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-text .status{
  font-size:.72rem;color:#34d399;display:flex;align-items:center;gap:5px;margin-top:1px;
}
.status-dot{width:7px;height:7px;background:#34d399;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* ===== CHAT AREA ===== */
#chatBox{
  position:relative;z-index:1;
  flex:1;overflow-y:auto;padding:22px 16px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
.msg-row{display:flex;gap:10px;max-width:88%;animation:slideIn .35s cubic-bezier(.34,1.56,.64,1) both}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.ai{align-self:flex-start}
.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.95rem;
  margin-top:2px;
}
.msg-row.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.msg-row.user .msg-avatar{background:linear-gradient(135deg,#475569,#334155)}

.msg{
  padding:12px 16px;border-radius:18px;line-height:1.55;font-size:.92rem;
  word-break:break-word;white-space:pre-wrap;
}
.msg-row.user .msg{
  background:linear-gradient(135deg,var(--accent),#2563eb);
  border-bottom-right-radius:4px;color:#fff;
  box-shadow:0 6px 18px rgba(59,130,246,.25);
}
.msg-row.ai .msg{
  background:var(--glass2);border:1px solid var(--border);
  border-bottom-left-radius:4px;backdrop-filter:blur(8px);
}
@keyframes slideIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

.welcome{
  text-align:center;color:var(--muted);font-size:.78rem;padding:6px 0 14px;
  animation:fadeIn .6s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Typing indicator */
.typing-row{display:none;align-self:flex-start;animation:slideIn .3s ease}
.typing-row.show{display:flex;gap:10px;max-width:88%}
.typing-bubble{
  background:var(--glass2);border:1px solid var(--border);border-radius:18px;
  border-bottom-left-radius:4px;padding:14px 18px;display:flex;gap:5px;align-items:center;
  backdrop-filter:blur(8px);
}
.dot{width:7px;height:7px;background:var(--accent3);border-radius:50%;animation:bounce 1.3s infinite}
.dot:nth-child(2){animation-delay:.15s;background:var(--accent2)}
.dot:nth-child(3){animation-delay:.3s;background:var(--accent)}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-7px);opacity:1}}

/* ===== INPUT AREA ===== */
.input-area{
  position:relative;z-index:2;
  padding:16px;background:var(--glass);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:center;
}
#prompt{
  flex:1;padding:13px 18px;border-radius:50px;
  border:1px solid var(--border);background:rgba(255,255,255,.03);
  color:var(--text);outline:none;font-size:.92rem;font-family:'Inter',sans-serif;
  transition:all .25s;
}
#prompt::placeholder{color:#64748b}
#prompt:focus{
  border-color:rgba(59,130,246,.5);background:rgba(59,130,246,.06);
  box-shadow:0 0 0 3px rgba(59,130,246,.12);
}
.send-btn{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;cursor:pointer;font-size:1.15rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.send-btn:hover{transform:scale(1.08) rotate(8deg);box-shadow:0 8px 22px rgba(59,130,246,.4)}
.send-btn:active{transform:scale(.94)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}

@media(max-width:480px){
  .header-text h3{font-size:.95rem}
  .msg-row{max-width:94%}
  .msg{font-size:.88rem;padding:11px 14px}
}
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<header>
  <a href="portofolio.html" class="back-btn">← Kembali</a>
  <div class="header-info">
    <div class="bot-avatar">🤖</div>
    <div class="header-text">
      <h3>Asisten Rapi</h3>
      <div class="status"><span class="status-dot"></span> Online &amp; siap membantu</div>
    </div>
  </div>
</header>

<div id="chatBox">
  <div class="welcome">Mulai percakapan dengan Asisten Rapi ✨</div>
  <div class="msg-row ai">
    <div class="msg-avatar">🤖</div>
    <div class="msg">Halo! Saya Asisten Rapi. Ada yang bisa saya bantu hari ini?</div>
  </div>
  <div class="typing-row" id="typingRow">
    <div class="msg-avatar">🤖</div>
    <div class="typing-bubble">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>
</div>

<div class="input-area">
  <input type="text" id="prompt" placeholder="Ketik pesan kamu..." autocomplete="off">
  <button class="send-btn" id="sendBtn" onclick="askAI()" title="Kirim">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
  </button>
</div>

<script>
const chatBox = document.getElementById('chatBox');
const typingRow = document.getElementById('typingRow');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('sendBtn');
let history = [];
let busy = false;

promptEl.addEventListener('keypress', e => {
  if (e.key === 'Enter') askAI();
});

function addMessage(text, who) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + who;
  row.innerHTML = `
    <div class="msg-avatar">${who === 'user' ? '🙂' : '🤖'}</div>
    <div class="msg"></div>`;
  row.querySelector('.msg').textContent = text;
  chatBox.insertBefore(row, typingRow);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function askAI() {
  if (busy) return;
  const prompt = promptEl.value.trim();
  if (!prompt) return;

  addMessage(prompt, 'user');
  promptEl.value = '';
  busy = true;
  sendBtn.disabled = true;
  typingRow.classList.add('show');
  chatBox.scrollTop = chatBox.scrollHeight;

  const b1 = "AQ.Ab8RN6K7SI1bve3NK77Yp33uuACp_5Vm";
  const b2 = "X86kuOss0xfMa3Kg9A";
  const KEY = b1 + b2;

  history.push({ role: "user", parts: [{ text: prompt }] });

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: history })
    });
    const data = await res.json();

    if (data.candidates && data.candidates[0]) {
      const aiText = data.candidates[0].content.parts[0].text;
      addMessage(aiText, 'ai');
      history.push({ role: "model", parts: [{ text: aiText }] });
    } else {
      addMessage("Maaf, terjadi kesalahan saat memproses permintaan. Coba lagi ya.", 'ai');
      history.pop();
    }
  } catch (e) {
    addMessage("Asisten sedang sibuk, coba lagi sebentar ya 🙏", 'ai');
    history.pop();
  } finally {
    typingRow.classList.remove('show');
    sendBtn.disabled = false;
    busy = false;
    chatBox.scrollTop = chatBox.scrollHeight;
    promptEl.focus();
  }
}
</script>
</body>
</html>
