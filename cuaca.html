<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaca Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Outfit',sans-serif;min-height:100vh;background:#0f0c29;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;color:#fff}
  .bg-anim{position:fixed;inset:0;z-index:0}
  .cloud{position:absolute;background:rgba(255,255,255,0.06);border-radius:50px;animation:drift linear infinite}
  @keyframes drift{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
  .container{position:relative;z-index:1;width:min(420px,95vw);background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:28px;padding:32px;text-align:center}
  h1{font-size:1.1rem;font-weight:400;opacity:.6;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}
  .search-box{display:flex;gap:10px;margin-bottom:28px}
  .search-box input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:12px 18px;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;outline:none;transition:.3s}
  .search-box input:focus{border-color:#a78bfa;background:rgba(167,139,250,0.1)}
  .search-box input::placeholder{color:rgba(255,255,255,0.4)}
  .search-box button{background:linear-gradient(135deg,#a78bfa,#60a5fa);border:none;border-radius:14px;padding:12px 20px;color:#fff;font-size:1.2rem;cursor:pointer;transition:.3s}
  .search-box button:hover{transform:scale(1.05)}
  .weather-icon{font-size:5rem;margin:10px 0;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .temp{font-size:4.5rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .city{font-size:1.4rem;font-weight:600;margin:4px 0}
  .desc{opacity:.6;text-transform:capitalize;margin-bottom:20px}
  .details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:20px}
  .detail-card{background:rgba(255,255,255,0.06);border-radius:16px;padding:14px 8px}
  .detail-card .label{font-size:.7rem;opacity:.5;text-transform:uppercase;letter-spacing:1px}
  .detail-card .val{font-size:1.2rem;font-weight:600;margin-top:4px}
  .error{color:#f87171;font-size:.9rem;margin-top:10px;display:none}
  .loading{display:none;font-size:.9rem;opacity:.6}
  .pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
</style>
</head>
<body>
<div class="bg-anim" id="bgAnim"></div>
<div class="container">
  <h1>🌍 Cuaca Live</h1>
  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Masukkan nama kota..." onkeydown="if(event.key==='Enter')getWeather()">
    <button onclick="getWeather()">🔍</button>
  </div>
  <div class="loading pulse" id="loading">Mencari data cuaca...</div>
  <div class="error" id="error">Kota tidak ditemukan!</div>
  <div id="result" style="display:none">
    <div class="weather-icon" id="icon">☀️</div>
    <div class="temp" id="temp">--°C</div>
    <div class="city" id="cityName">--</div>
    <div class="desc" id="desc">--</div>
    <div class="details">
      <div class="detail-card"><div class="label">Kelembaban</div><div class="val" id="humidity">--%</div></div>
      <div class="detail-card"><div class="label">Angin</div><div class="val" id="wind">-- km/h</div></div>
      <div class="detail-card"><div class="label">Terasa</div><div class="val" id="feels">--°C</div></div>
    </div>
  </div>
</div>
<script>
// Generate animated clouds
const bg = document.getElementById('bgAnim');
for(let i=0;i<8;i++){
  const c=document.createElement('div');
  c.className='cloud';
  const h=20+Math.random()*40, w=80+Math.random()*200;
  c.style.cssText=`width:${w}px;height:${h}px;top:${Math.random()*100}%;animation-duration:${15+Math.random()*20}s;animation-delay:-${Math.random()*20}s;opacity:${0.04+Math.random()*0.08}`;
  bg.appendChild(c);
}

const icons={Clear:'☀️',Clouds:'☁️',Rain:'🌧️',Drizzle:'🌦️',Thunderstorm:'⛈️',Snow:'❄️',Mist:'🌫️',Haze:'🌫️',Fog:'🌁'};

async function getWeather(){
  const city=document.getElementById('cityInput').value.trim();
  if(!city)return;
  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('error').style.display='none';
  try{
    // Using Open-Meteo + Geocoding (100% free, no API key)
    const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=id`);
    const gd=await geo.json();
    if(!gd.results?.length)throw new Error('not found');
    const {latitude:lat,longitude:lon,name,country}=gd.results[0];
    const wx=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code`);
    const wd=await wx.json();
    const c=wd.current;
    const wcode=c.weather_code;
    let cond='Clear',emoji='☀️';
    if(wcode>=0&&wcode<=1){cond='Cerah';emoji='☀️';}
    else if(wcode<=3){cond='Berawan';emoji='⛅';}
    else if(wcode<=49){cond='Berkabut';emoji='🌫️';}
    else if(wcode<=69){cond='Hujan';emoji='🌧️';}
    else if(wcode<=79){cond='Salju';emoji='❄️';}
    else if(wcode<=82){cond='Hujan Lebat';emoji='🌦️';}
    else{cond='Badai';emoji='⛈️';}
    document.getElementById('icon').textContent=emoji;
    document.getElementById('temp').textContent=Math.round(c.temperature_2m)+'°C';
    document.getElementById('cityName').textContent=`${name}, ${country}`;
    document.getElementById('desc').textContent=cond;
    document.getElementById('humidity').textContent=c.relative_humidity_2m+'%';
    document.getElementById('wind').textContent=Math.round(c.wind_speed_10m)+' km/h';
    document.getElementById('feels').textContent=Math.round(c.apparent_temperature)+'°C';
    document.getElementById('result').style.display='block';
  }catch(e){
    document.getElementById('error').style.display='block';
  }
  document.getElementById('loading').style.display='none';
}
</script>
</body>
</html>
