<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Rapi | ✅ Manajer Tugas</title>
    <style>
        :root { 
            --bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); 
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --text: #f8fafc; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn { 
            color: var(--accent); text-decoration: none; font-size: 0.9rem; 
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--accent); transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); color: white; }
        
        /* Nav Bar Scroll */
        .nav-wrapper { padding: 0 15px; }
        .nav-bar { 
            display: flex; background: rgba(0,0,0,0.2); padding: 5px; margin-top: 15px; 
            border-radius: 12px; gap: 5px; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .nav-bar::-webkit-scrollbar { display: none; }
        
        .nav-link { 
            flex: 0 0 auto; text-align: center; padding: 10px 15px; color: #94a3b8; 
            text-decoration: none; font-size: 0.85rem; border-radius: 8px; transition: 0.3s; 
        }
        .nav-link.active { background: var(--accent); color: white; font-weight: bold; }
        
        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .tool-container { 
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; 
            background: var(--glass); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Group */
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { 
            flex: 1; background: rgba(15, 23, 42, 0.6); color: white; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; 
            font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        
        button.btn-add { 
            background: var(--accent); color: white; border: none; border-radius: 12px; 
            width: 50px; display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button.btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }

        /* Task List */
        .task-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        
        .task-item { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; 
            align-items: center; gap: 15px; transition: 0.3s; animation: popIn 0.3s ease-out;
        }
        .task-item:hover { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .task-content { display: flex; align-items: center; gap: 15px; flex: 1; cursor: pointer; }
        
        .checkbox { 
            width: 24px; height: 24px; border: 2px solid #64748b; border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; transition: 0.3s; flex-shrink: 0;
        }
        .task-item:hover .checkbox:not(.checked) { border-color: var(--accent); }
        
        .checkbox.checked { background: var(--success); border-color: var(--success); }
        .checkbox.checked::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        
        .task-text { font-size: 0.95rem; color: #f8fafc; word-break: break-word; transition: 0.3s; line-height: 1.4; }
        .task-text.completed { text-decoration: line-through; color: #64748b; font-style: italic; }
        
        button.btn-delete { 
            background: rgba(239, 68, 68, 0.1); border: none; color: var(--danger); 
            width: 35px; height: 35px; border-radius: 8px; font-size: 1rem; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        button.btn-delete:hover { background: var(--danger); color: white; transform: scale(1.1); }

        .empty-state { text-align: center; color: #64748b; font-size: 0.95rem; margin-top: 10px; font-style: italic; padding: 20px; border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px; }
    </style>
</head>
<body>

    <header>
        <a href="portofolio.html" class="back-btn">← Portofolio</a>
        <h3 style="margin: 0; font-size: 1.1rem;">✅ Manajer Tugas</h3>
        <div style="width: 80px;"></div> </header>
    
    <div class="nav-wrapper">
        <div class="nav-bar">
            <a href="chatbot.html" class="nav-link">💬 Chat</a>
            <a href="gambar.html" class="nav-link">🎨 Gambar</a>
            <a href="konten.html" class="nav-link">📱 Konten</a>
            <a href="chord.html" class="nav-link">🎸 Chord</a>
            <a href="tiktok.html" class="nav-link">🎵 TikTok</a>
            <a href="teks.html" class="nav-link">✨ Teks</a>
            <a href="suara.html" class="nav-link">🎙️ Suara</a>
            <a href="qr.html" class="nav-link">🔳 QR</a>
            <a href="penghitung.html" class="nav-link">📝 Penghitung</a>
            <a href="tugas.html" class="nav-link active">📚 Tugas</a>
        </div>
    </div>

    <div class="main-content">
        <div class="tool-container">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Ketik ide konten / tugas baru di sini..." onkeypress="handleEnter(event)">
                <button class="btn-add" onclick="tambahTugas()">+</button>
            </div>
            
            <div class="task-list" id="taskList">
                </div>
        </div>
    </div>

    <script>
        let daftarTugas = JSON.parse(localStorage.getItem('aiHubTasks')) || [];

        function handleEnter(event) {
            if (event.key === 'Enter') tambahTugas();
        }

        function simpanData() {
            localStorage.setItem('aiHubTasks', JSON.stringify(daftarTugas));
            renderTugas();
        }

        function tambahTugas() {
            const input = document.getElementById('taskInput');
            const teks = input.value.trim();
            
            if (!teks) return;

            // Menambahkan tugas baru ke urutan paling atas
            daftarTugas.unshift({ id: Date.now(), teks: teks, selesai: false });
            input.value = '';
            simpanData();
        }

        function toggleTugas(id) {
            const tugas = daftarTugas.find(t => t.id === id);
            if (tugas) {
                tugas.selesai = !tugas.selesai;
                simpanData();
            }
        }

        function hapusTugas(id) {
            // Animasi hapus sederhana dengan memanipulasi DOM sebelum render ulang
            const itemElement = document.getElementById(`task-${id}`);
            if (itemElement) {
                itemElement.style.transform = 'scale(0.8)';
                itemElement.style.opacity = '0';
                setTimeout(() => {
                    daftarTugas = daftarTugas.filter(t => t.id !== id);
                    simpanData();
                }, 200);
            } else {
                daftarTugas = daftarTugas.filter(t => t.id !== id);
                simpanData();
            }
        }

        function renderTugas() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (daftarTugas.length === 0) {
                list.innerHTML = '<div class="empty-state">Belum ada tugas. Wah, meja kerjamu bersih sekali! ✨</div>';
                return;
            }

            daftarTugas.forEach(tugas => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.id = `task-${tugas.id}`; // Tambahan ID untuk animasi hapus
                item.style.transition = 'all 0.2s ease-out';
                
                item.innerHTML = `
                    <div class="task-content" onclick="toggleTugas(${tugas.id})">
                        <div class="checkbox ${tugas.selesai ? 'checked' : ''}"></div>
                        <div class="task-text ${tugas.selesai ? 'completed' : ''}">${tugas.teks}</div>
                    </div>
                    <button class="btn-delete" onclick="hapusTugas(${tugas.id})" title="Hapus Tugas">🗑️</button>
                `;
                list.appendChild(item);
            });
        }

        // Render data saat pertama kali aplikasi dibuka
        renderTugas();
    </script>
</body>
</html>
