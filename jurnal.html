<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurnal Harian · Rapi Dev</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03030a;--surface:rgba(15,15,35,.75);--blue:#3b82f6;--violet:#7c3aed;--cyan:#06b6d4;--green:#4ade80;--text:#e2e8f0;--muted:#64748b}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 45% at 20% 20%,rgba(124,58,237,.18) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 80% 70%,rgba(59,130,246,.14) 0%,transparent 60%);
  animation:auroraShift 13s ease-in-out infinite alternate}
@keyframes auroraShift{0%{transform:scale(1)}100%{transform:scale(1.08) rotate(2deg)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(124,58,237,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.025) 1px,transparent 1px);
  background-size:55px 55px}

.wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;max-width:680px;margin:0 auto}

.back-btn{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600;padding:6px 14px;border:1px solid rgba(255,255,255,.07);border-radius:50px;transition:.3s;margin-bottom:28px}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

.header{text-align:center;margin-bottom:32px;animation:slideDown .8s cubic-bezier(.16,1,.3,1) both}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.brand{font-size:.75rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#a78bfa;margin-bottom:8px;opacity:.8}
.page-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,7vw,2.8rem);font-weight:800;background:linear-gradient(135deg,#fff 20%,#a78bfa 55%,var(--cyan) 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.page-sub{font-size:.9rem;color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* STATS ROW */
.stats-row{display:flex;gap:12px;width:100%;margin-bottom:28px;animation:fadeUp .8s .2s both}
.stat-card{flex:1;background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px 16px;text-align:center;backdrop-filter:blur(12px)}
.stat-num{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:2px}

/* WRITE AREA */
.write-card{width:100%;background:var(--surface);border:1px solid rgba(124,58,237,.2);border-radius:24px;padding:24px;margin-bottom:20px;animation:fadeUp .8s .3s both;backdrop-filter:blur(16px);position:relative;overflow:hidden}
.write-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--cyan),var(--blue));border-radius:24px 24px 0 0}

.write-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.date-display{font-size:.82rem;font-weight:600;color:#a78bfa}
.mood-quick{display:flex;gap:6px}
.mq-btn{background:none;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:1.1rem;transition:transform .2s,border-color .2s}
.mq-btn.sel,.mq-btn:hover{transform:scale(1.2);border-color:rgba(124,58,237,.5)}

.title-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.08);padding:8px 0;font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text);outline:none;margin-bottom:14px;transition:border-color .3s}
.title-input::placeholder{color:rgba(100,116,139,.5)}
.title-input:focus{border-bottom-color:rgba(124,58,237,.4)}

.body-input{width:100%;background:transparent;border:none;padding:0;font-family:'Space Grotesk',sans-serif;font-size:.92rem;color:var(--text);outline:none;resize:none;min-height:140px;line-height:1.8;transition:none}
.body-input::placeholder{color:rgba(100,116,139,.45)}

.word-count{font-size:.72rem;color:var(--muted);text-align:right;margin-top:8px}

/* ACTION BTNS */
.action-row{display:flex;gap:10px;margin-bottom:28px;animation:fadeUp .8s .4s both;flex-wrap:wrap}
.save-btn{flex:1;background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;border:none;border-radius:50px;padding:13px 24px;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;position:relative;overflow:hidden}
.save-btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:.3s}
.save-btn:hover::before{opacity:1}
.save-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 6px 24px rgba(124,58,237,.4)}
.ai-btn{background:var(--surface);border:1px solid rgba(6,182,212,.3);border-radius:50px;padding:13px 24px;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;color:var(--cyan);cursor:pointer;transition:.3s;backdrop-filter:blur(10px)}
.ai-btn:hover{background:rgba(6,182,212,.15);border-color:rgba(6,182,212,.6);transform:translateY(-3px)}
.ai-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* LOADING */
.loading-orbs{display:none;gap:8px;justify-content:center;padding:16px}
.loading-orbs.visible{display:flex}
.orb-dot{width:9px;height:9px;border-radius:50%;animation:orbPulse 1.2s ease-in-out infinite}
.orb-dot:nth-child(1){background:var(--violet)}
.orb-dot:nth-child(2){background:var(--cyan);animation-delay:.2s}
.orb-dot:nth-child(3){background:var(--blue);animation-delay:.4s}
@keyframes orbPulse{0%,100%{transform:scale(.6);opacity:.4}50%{transform:scale(1.2);opacity:1}}

/* AI RESULT */
.ai-result{width:100%;background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.15);border-radius:18px;padding:20px;margin-bottom:20px;display:none}
.ai-result.visible{display:block;animation:fadeUp .4s both}
.ai-result-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-result-body{font-size:.88rem;line-height:1.8;white-space:pre-wrap}
.ai-result-body.typing::after{content:'▋';animation:blink .7s step-end infinite;color:var(--cyan)}
@keyframes blink{50%{opacity:0}}

/* JOURNAL LIST */
.journal-section{width:100%;animation:fadeUp .8s .5s both}
.js-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.js-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.clear-btn{font-size:.72rem;color:rgba(239,68,68,.6);background:none;border:1px solid rgba(239,68,68,.2);border-radius:50px;padding:4px 10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.25s}
.clear-btn:hover{color:#f87171;border-color:rgba(239,68,68,.5)}

.journal-list{display:flex;flex-direction:column;gap:10px}
.journal-item{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px 18px;backdrop-filter:blur(10px);transition:border-color .3s,transform .3s;cursor:pointer}
.journal-item:hover{border-color:rgba(124,58,237,.3);transform:translateX(4px)}
.ji-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ji-title{font-weight:700;font-size:.9rem}
.ji-date{font-size:.72rem;color:var(--muted)}
.ji-preview{font-size:.8rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ji-mood{font-size:1.1rem}

.empty-state{text-align:center;padding:32px;color:var(--muted);font-size:.88rem}
.empty-state div{font-size:2.5rem;margin-bottom:10px}

.footer{margin-top:60px;text-align:center;font-size:.75rem;color:var(--muted)}
.footer a{color:#a78bfa;text-decoration:none}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:var(--green);padding:10px 24px;border-radius:50px;font-size:.85rem;font-weight:600;z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div class="aurora"></div>
<div class="grid-overlay"></div>
<div class="toast" id="toast"></div>

<div class="wrapper">
  <a href="portofolio.html" class="back-btn">← Kembali</a>

  <div class="header">
    <p class="brand">📓 Rapi Dev · Jurnal Harian</p>
    <h1 class="page-title">Jurnal Harian</h1>
    <p class="page-sub">Tulis ceritamu, AI bantu merefleksikannya</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total Entri</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statStreak">0</div>
      <div class="stat-label">Hari Berturut</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statWords">0</div>
      <div class="stat-label">Total Kata</div>
    </div>
  </div>

  <div class="write-card">
    <div class="write-top">
      <div class="date-display" id="currentDate"></div>
      <div class="mood-quick" id="moodQuick">
        <button class="mq-btn" data-m="😊" onclick="selMood(this)">😊</button>
        <button class="mq-btn" data-m="😐" onclick="selMood(this)">😐</button>
        <button class="mq-btn" data-m="😢" onclick="selMood(this)">😢</button>
        <button class="mq-btn" data-m="🔥" onclick="selMood(this)">🔥</button>
        <button class="mq-btn" data-m="😴" onclick="selMood(this)">😴</button>
      </div>
    </div>
    <input class="title-input" id="journalTitle" type="text" placeholder="Judul entri...">
    <textarea class="body-input" id="journalBody" placeholder="Apa yang terjadi hari ini? Bagaimana perasaanmu?..."
      oninput="updateWordCount()"></textarea>
    <div class="word-count" id="wordCount">0 kata</div>
  </div>

  <div class="action-row">
    <button class="save-btn" onclick="saveEntry()">💾 Simpan Entri</button>
    <button class="ai-btn" id="aiBtn" onclick="aiReflect()">🤖 Refleksi AI</button>
  </div>

  <div class="loading-orbs" id="loadingOrbs">
    <div class="orb-dot"></div><div class="orb-dot"></div><div class="orb-dot"></div>
  </div>

  <div class="ai-result" id="aiResult">
    <div class="ai-result-title">🤖 Refleksi AI</div>
    <div class="ai-result-body" id="aiBody"></div>
  </div>

  <div class="journal-section">
    <div class="js-header">
      <span class="js-title">📚 Entri Tersimpan</span>
      <button class="clear-btn" onclick="clearAll()">🗑️ Hapus Semua</button>
    </div>
    <div class="journal-list" id="journalList"></div>
  </div>

  <div class="footer"><p>© 2025 <a href="#">Rapi Dev</a> · Powered by Claude AI 📓</p></div>
</div>

<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;stars=Array.from({length:160},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.2,o:Math.random(),s:Math.random()*.004+.002}))}
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.o+=s.s;if(s.o>1||s.o<0)s.s*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,160,255,${s.o*.5})`;ctx.fill()});requestAnimationFrame(draw)}
  resize();window.addEventListener('resize',resize);draw();
})();

/* INIT */
document.getElementById('currentDate').textContent=new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
let selectedMood='😊';

function selMood(el){
  document.querySelectorAll('.mq-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');selectedMood=el.dataset.m;
}

function updateWordCount(){
  const words=document.getElementById('journalBody').value.trim().split(/\s+/).filter(w=>w).length;
  document.getElementById('wordCount').textContent=words+' kata';
}

/* STORAGE */
function getEntries(){
  try{return JSON.parse(localStorage.getItem('rapi_journal')||'[]')}catch{return []}
}
function saveEntries(entries){
  localStorage.setItem('rapi_journal',JSON.stringify(entries));
}

function saveEntry(){
  const title=document.getElementById('journalTitle').value.trim();
  const body=document.getElementById('journalBody').value.trim();
  if(!body){showToast('⚠️ Tulis dulu isi jurnalmu!');return}
  const entries=getEntries();
  entries.unshift({
    id:Date.now(),
    title:title||'Tanpa Judul',
    body,mood:selectedMood,
    date:new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}),
    ts:Date.now()
  });
  saveEntries(entries);
  document.getElementById('journalTitle').value='';
  document.getElementById('journalBody').value='';
  document.getElementById('wordCount').textContent='0 kata';
  showToast('✅ Entri berhasil disimpan!');
  renderList();updateStats();
}

async function aiReflect(){
  const body=document.getElementById('journalBody').value.trim();
  if(!body){showToast('⚠️ Tulis dulu isi jurnalmu!');return}
  const btn=document.getElementById('aiBtn');
  const loading=document.getElementById('loadingOrbs');
  const result=document.getElementById('aiResult');
  const aiBody=document.getElementById('aiBody');
  btn.disabled=true;loading.classList.add('visible');result.classList.remove('visible');

  const prompt=`Kamu adalah seorang journaling coach yang penuh empati dan bijaksana. Seseorang menulis jurnal harian:

"${body}"

Mood mereka: ${selectedMood}

Berikan refleksi personal dalam Bahasa Indonesia yang:
1. Mengakui dan memvalidasi perasaan mereka
2. Mengidentifikasi tema atau pola penting dalam tulisan mereka
3. Memberikan 1-2 pertanyaan refleksi yang membuka wawasan diri
4. Diakhiri dengan afirmasi positif yang tulus

Tulis dalam 3-4 paragraf, hangat, personal, dan tidak terasa generik.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');

    loading.classList.remove('visible');result.classList.add('visible');
    aiBody.classList.add('typing');aiBody.textContent='';
    let i=0;
    const interval=setInterval(()=>{
      if(i<text.length){aiBody.textContent+=text[i++]}
      else{clearInterval(interval);aiBody.classList.remove('typing')}
    },22);
  }catch(e){
    loading.classList.remove('visible');
    aiBody.textContent='Gagal memuat refleksi. Coba lagi!';
    result.classList.add('visible');
  }
  btn.disabled=false;
}

function clearAll(){
  if(!confirm('Hapus semua entri jurnal?'))return;
  localStorage.removeItem('rapi_journal');
  renderList();updateStats();
  showToast('🗑️ Semua entri dihapus');
}

function renderList(){
  const entries=getEntries();
  const list=document.getElementById('journalList');
  if(!entries.length){
    list.innerHTML='<div class="empty-state"><div>📓</div>Belum ada entri. Mulai menulis hari ini!</div>';
    return;
  }
  list.innerHTML=entries.map(e=>`
    <div class="journal-item">
      <div class="ji-header">
        <span class="ji-title">${e.mood} ${e.title}</span>
        <span class="ji-date">${e.date}</span>
      </div>
      <div class="ji-preview">${e.body}</div>
    </div>`).join('');
}

function updateStats(){
  const entries=getEntries();
  document.getElementById('statTotal').textContent=entries.length;
  const totalWords=entries.reduce((s,e)=>s+e.body.split(/\s+/).filter(w=>w).length,0);
  document.getElementById('statWords').textContent=totalWords>999?(Math.floor(totalWords/100)/10)+'K':totalWords;
  // simple streak: count consecutive days
  const days=new Set(entries.map(e=>new Date(e.ts).toDateString()));
  document.getElementById('statStreak').textContent=days.size;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

renderList();updateStats();
</script>
</body>
</html>
