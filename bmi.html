<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator BMI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#0a0a0f;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px}
  .particles{position:fixed;inset:0;overflow:hidden;z-index:0}
  .dot{position:absolute;border-radius:50%;animation:rise linear infinite}
  @keyframes rise{from{transform:translateY(100vh) scale(0);opacity:0}20%{opacity:1}to{transform:translateY(-100px) scale(1);opacity:0}}
  .container{position:relative;z-index:1;width:min(420px,100%);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:28px;padding:32px}
  h1{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:4px}
  .sub{text-align:center;opacity:.4;font-size:.85rem;margin-bottom:28px}
  .toggle{display:flex;background:rgba(255,255,255,0.06);border-radius:12px;padding:4px;gap:4px;margin-bottom:22px}
  .toggle button{flex:1;background:none;border:none;color:rgba(255,255,255,.5);padding:9px;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;transition:.3s}
  .toggle button.active{background:rgba(255,255,255,.12);color:#fff}
  .field{margin-bottom:18px}
  .field label{font-size:.8rem;opacity:.5;display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
  .slider-row{display:flex;align-items:center;gap:14px}
  .slider-row input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:5px;background:rgba(255,255,255,.1);outline:none}
  .slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);cursor:pointer;box-shadow:0 0 10px rgba(245,158,11,.5)}
  .slider-row .val{font-size:1.2rem;font-weight:700;min-width:55px;text-align:right;color:#f59e0b}
  .gauge-wrap{text-align:center;margin:20px 0 10px}
  svg.gauge{width:200px;height:110px;overflow:visible}
  .bmi-val{font-size:2.8rem;font-weight:700;text-align:center}
  .bmi-cat{text-align:center;font-size:1rem;font-weight:500;margin-top:4px;padding:5px 18px;border-radius:20px;display:inline-block}
  .result-center{text-align:center}
  .tips{background:rgba(255,255,255,.04);border-radius:14px;padding:14px 18px;margin-top:18px;font-size:.85rem;line-height:1.6;opacity:.7}
</style>
</head>
<body>
<div class="particles" id="parts"></div>
<div class="container">
  <h1>⚖️ Kalkulator BMI</h1>
  <div class="sub">Body Mass Index — Cek Berat Badan Idealmu</div>
  <div class="toggle">
    <button class="active" onclick="setUnit('metric',this)">Metrik (kg/cm)</button>
    <button onclick="setUnit('imperial',this)">Imperial (lb/in)</button>
  </div>
  <div class="field">
    <label id="wLabel">Berat Badan (kg)</label>
    <div class="slider-row">
      <input type="range" id="weight" min="30" max="200" value="65" oninput="calc()">
      <span class="val" id="wVal">65 kg</span>
    </div>
  </div>
  <div class="field">
    <label id="hLabel">Tinggi Badan (cm)</label>
    <div class="slider-row">
      <input type="range" id="height" min="100" max="250" value="170" oninput="calc()">
      <span class="val" id="hVal">170 cm</span>
    </div>
  </div>
  <div class="gauge-wrap">
    <svg class="gauge" viewBox="0 0 200 110">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="30%" stop-color="#22c55e"/>
          <stop offset="65%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>
      </defs>
      <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="14" stroke-linecap="round"/>
      <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>
      <line id="needle" x1="100" y1="100" x2="100" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round" transform="rotate(0,100,100)"/>
      <circle cx="100" cy="100" r="6" fill="#fff"/>
    </svg>
  </div>
  <div class="result-center">
    <div class="bmi-val" id="bmiVal">22.5</div>
    <div class="bmi-cat" id="bmiCat">Normal</div>
  </div>
  <div class="tips" id="tips">Pertahankan pola makan sehat dan olahraga teratur untuk menjaga berat badan ideal Anda.</div>
</div>
<script>
// Particles
const p=document.getElementById('parts');
for(let i=0;i<20;i++){const d=document.createElement('div');d.className='dot';const s=3+Math.random()*6;d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${['#f59e0b','#ef4444','#22c55e','#3b82f6'][~~(Math.random()*4)]};opacity:0;animation-duration:${4+Math.random()*6}s;animation-delay:-${Math.random()*8}s`;p.appendChild(d)}

let unit='metric';
function setUnit(u,btn){
  unit=u;
  document.querySelectorAll('.toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const w=document.getElementById('weight'),h=document.getElementById('height');
  if(u==='imperial'){w.min=66;w.max=440;w.value=143;h.min=39;h.max=98;h.value=67;document.getElementById('wLabel').textContent='Berat Badan (lb)';document.getElementById('hLabel').textContent='Tinggi Badan (in)';}
  else{w.min=30;w.max=200;w.value=65;h.min=100;h.max=250;h.value=170;document.getElementById('wLabel').textContent='Berat Badan (kg)';document.getElementById('hLabel').textContent='Tinggi Badan (cm)';}
  calc();
}

function calc(){
  const w=+document.getElementById('weight').value,h=+document.getElementById('height').value;
  document.getElementById('wVal').textContent=w+(unit==='metric'?' kg':' lb');
  document.getElementById('hVal').textContent=h+(unit==='metric'?' cm':' in');
  let bmi;
  if(unit==='metric')bmi=w/((h/100)**2);
  else bmi=(w/(h*h))*703;
  bmi=Math.round(bmi*10)/10;
  document.getElementById('bmiVal').textContent=bmi;
  let cat,color,tip;
  if(bmi<18.5){cat='Kurus';color='#3b82f6';tip='Kamu perlu menambah asupan kalori dan konsultasi dengan ahli gizi untuk mencapai berat ideal.';}
  else if(bmi<25){cat='Normal ✓';color='#22c55e';tip='Berat badanmu ideal! Pertahankan pola makan sehat dan olahraga 3-5x seminggu.';}
  else if(bmi<30){cat='Kelebihan Berat';color='#f59e0b';tip='Mulai kurangi kalori berlebih, perbanyak sayur-buahan, dan rutin berolahraga cardio.';}
  else{cat='Obesitas';color='#ef4444';tip='Sangat disarankan konsultasi dokter. Mulai program diet terstruktur dan aktivitas fisik teratur.';}
  const catEl=document.getElementById('bmiCat');
  catEl.textContent=cat;catEl.style.background=color+'22';catEl.style.color=color;
  document.getElementById('tips').textContent=tip;
  // Needle: bmi 10→45 maps to -90°→90°
  const deg=Math.min(90,Math.max(-90,((bmi-10)/(45-10))*180-90));
  document.getElementById('needle').setAttribute('transform',`rotate(${deg},100,100)`);
}
calc();
</script>
</body>
</html>
