<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horoscope · Rapi Dev</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03030a;--surface:rgba(15,15,35,0.75);
  --gold:#f59e0b;--violet:#7c3aed;--cyan:#06b6d4;--pink:#ec4899;
  --blue:#3b82f6;--text:#e2e8f0;--muted:#64748b;
}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── BG LAYERS ── */
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(124,58,237,.2) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(245,158,11,.12) 0%,transparent 60%);
  animation:auroraShift 14s ease-in-out infinite alternate}
@keyframes auroraShift{0%{transform:scale(1) rotate(0deg)}100%{transform:scale(1.1) rotate(3deg)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);
  background-size:60px 60px}

/* ── WRAPPER ── */
.wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px;max-width:680px;margin:0 auto}

/* ── HEADER ── */
.back-btn{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600;padding:6px 14px;border:1px solid rgba(255,255,255,.07);border-radius:50px;transition:.3s;margin-bottom:28px}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

.header{text-align:center;margin-bottom:40px;animation:slideDown .8s cubic-bezier(.16,1,.3,1) both}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.brand{font-size:.75rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;opacity:.8}
.page-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,7vw,3rem);font-weight:800;background:linear-gradient(135deg,#fff 20%,var(--gold) 60%,var(--pink) 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
.page-sub{font-size:.9rem;color:var(--muted)}

/* ── ZODIAC GRID ── */
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;margin-bottom:32px;animation:fadeUp .8s .2s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.zodiac-btn{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s;font-family:'Space Grotesk',sans-serif;color:var(--muted);position:relative;overflow:hidden}
.zodiac-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(124,58,237,.1));opacity:0;transition:opacity .3s}
.zodiac-btn:hover::before,.zodiac-btn.active::before{opacity:1}
.zodiac-btn:hover,.zodiac-btn.active{transform:translateY(-4px) scale(1.04);border-color:rgba(245,158,11,.5);box-shadow:0 6px 24px rgba(245,158,11,.2);color:var(--text)}
.zodiac-btn.active{border-color:rgba(245,158,11,.7);box-shadow:0 6px 28px rgba(245,158,11,.3)}
.zodiac-emoji{font-size:1.5rem;display:block;margin-bottom:4px;transition:transform .3s}
.zodiac-btn:hover .zodiac-emoji,.zodiac-btn.active .zodiac-emoji{transform:scale(1.2) rotate(-5deg)}
.zodiac-name{font-size:.7rem;font-weight:600;display:block}
.zodiac-date{font-size:.6rem;display:block;opacity:.5;margin-top:2px}

/* ── ASPECT SELECTOR ── */
.aspect-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;animation:fadeUp .8s .35s both}
.aspect-btn{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:50px;padding:7px 16px;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:.3s}
.aspect-btn:hover,.aspect-btn.active{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.5);color:#a78bfa}

/* ── GENERATE BTN ── */
.gen-btn{background:linear-gradient(135deg,var(--gold),var(--pink));color:#fff;border:none;border-radius:50px;padding:14px 40px;font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;margin-bottom:32px;animation:fadeUp .8s .5s both;position:relative;overflow:hidden}
.gen-btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.15);opacity:0;transition:opacity .3s}
.gen-btn:hover::before{opacity:1}
.gen-btn:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 8px 32px rgba(245,158,11,.4)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── RESULT CARD ── */
.result-wrap{width:100%;animation:fadeUp .6s both;display:none}
.result-wrap.visible{display:block}

.result-card{background:var(--surface);border:1px solid rgba(245,158,11,.2);border-radius:24px;padding:28px;backdrop-filter:blur(16px);position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--pink),var(--violet));border-radius:24px 24px 0 0}

.result-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.result-emoji{font-size:2.8rem;filter:drop-shadow(0 0 12px rgba(245,158,11,.5))}
.result-meta h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800}
.result-meta p{font-size:.8rem;color:var(--gold);font-weight:600;margin-top:2px}

.result-body{font-size:.92rem;line-height:1.8;color:var(--text);white-space:pre-wrap}
.result-body.typing::after{content:'▋';animation:blink .7s step-end infinite;color:var(--gold)}
@keyframes blink{50%{opacity:0}}

/* lucky strip */
.lucky-strip{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.lucky-tag{font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:50px;border:1px solid}
.lt-gold{color:var(--gold);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
.lt-pink{color:var(--pink);border-color:rgba(236,72,153,.4);background:rgba(236,72,153,.08)}
.lt-cyan{color:var(--cyan);border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.08)}

/* stars rating */
.star-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.star-item{font-size:.75rem;color:var(--muted)}
.star-item span{color:#fbbf24}

/* ── LOADING ── */
.loading-orbs{display:flex;gap:8px;justify-content:center;padding:24px;display:none}
.loading-orbs.visible{display:flex}
.orb-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:orbPulse 1.2s ease-in-out infinite}
.orb-dot:nth-child(2){animation-delay:.2s;background:var(--pink)}
.orb-dot:nth-child(3){animation-delay:.4s;background:var(--violet)}
@keyframes orbPulse{0%,100%{transform:scale(.6);opacity:.4}50%{transform:scale(1.2);opacity:1}}

/* ── FOOTER ── */
.footer{margin-top:60px;text-align:center;font-size:.75rem;color:var(--muted)}
.footer a{color:var(--gold);text-decoration:none}

/* ── SHOOTING STARS ── */
.shooting-star{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;pointer-events:none;z-index:0}
.shooting-star::before{content:'';position:absolute;top:50%;right:0;transform:translateY(-50%);width:80px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.8),transparent)}

@media(max-width:480px){.zodiac-grid{grid-template-columns:repeat(3,1fr)}.lucky-strip{gap:6px}}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="aurora"></div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <a href="portofolio.html" class="back-btn">← Kembali</a>

  <div class="header">
    <p class="brand">✨ Rapi Dev · AI Horoscope</p>
    <h1 class="page-title">Ramalan Bintang</h1>
    <p class="page-sub">Pilih zodiak & aspek kehidupanmu hari ini</p>
  </div>

  <div class="zodiac-grid">
    <button class="zodiac-btn" data-sign="Aries" onclick="selectSign(this)">
      <span class="zodiac-emoji">♈</span>
      <span class="zodiac-name">Aries</span>
      <span class="zodiac-date">Mar 21–Apr 19</span>
    </button>
    <button class="zodiac-btn" data-sign="Taurus" onclick="selectSign(this)">
      <span class="zodiac-emoji">♉</span>
      <span class="zodiac-name">Taurus</span>
      <span class="zodiac-date">Apr 20–Mei 20</span>
    </button>
    <button class="zodiac-btn" data-sign="Gemini" onclick="selectSign(this)">
      <span class="zodiac-emoji">♊</span>
      <span class="zodiac-name">Gemini</span>
      <span class="zodiac-date">Mei 21–Jun 20</span>
    </button>
    <button class="zodiac-btn" data-sign="Cancer" onclick="selectSign(this)">
      <span class="zodiac-emoji">♋</span>
      <span class="zodiac-name">Cancer</span>
      <span class="zodiac-date">Jun 21–Jul 22</span>
    </button>
    <button class="zodiac-btn" data-sign="Leo" onclick="selectSign(this)">
      <span class="zodiac-emoji">♌</span>
      <span class="zodiac-name">Leo</span>
      <span class="zodiac-date">Jul 23–Ags 22</span>
    </button>
    <button class="zodiac-btn" data-sign="Virgo" onclick="selectSign(this)">
      <span class="zodiac-emoji">♍</span>
      <span class="zodiac-name">Virgo</span>
      <span class="zodiac-date">Ags 23–Sep 22</span>
    </button>
    <button class="zodiac-btn" data-sign="Libra" onclick="selectSign(this)">
      <span class="zodiac-emoji">♎</span>
      <span class="zodiac-name">Libra</span>
      <span class="zodiac-date">Sep 23–Okt 22</span>
    </button>
    <button class="zodiac-btn" data-sign="Scorpio" onclick="selectSign(this)">
      <span class="zodiac-emoji">♏</span>
      <span class="zodiac-name">Scorpio</span>
      <span class="zodiac-date">Okt 23–Nov 21</span>
    </button>
    <button class="zodiac-btn" data-sign="Sagittarius" onclick="selectSign(this)">
      <span class="zodiac-emoji">♐</span>
      <span class="zodiac-name">Sagitarius</span>
      <span class="zodiac-date">Nov 22–Des 21</span>
    </button>
    <button class="zodiac-btn" data-sign="Capricorn" onclick="selectSign(this)">
      <span class="zodiac-emoji">♑</span>
      <span class="zodiac-name">Capricorn</span>
      <span class="zodiac-date">Des 22–Jan 19</span>
    </button>
    <button class="zodiac-btn" data-sign="Aquarius" onclick="selectSign(this)">
      <span class="zodiac-emoji">♒</span>
      <span class="zodiac-name">Aquarius</span>
      <span class="zodiac-date">Jan 20–Feb 18</span>
    </button>
    <button class="zodiac-btn" data-sign="Pisces" onclick="selectSign(this)">
      <span class="zodiac-emoji">♓</span>
      <span class="zodiac-name">Pisces</span>
      <span class="zodiac-date">Feb 19–Mar 20</span>
    </button>
  </div>

  <div class="aspect-row">
    <button class="aspect-btn active" data-aspect="Umum" onclick="selectAspect(this)">🌟 Umum</button>
    <button class="aspect-btn" data-aspect="Cinta" onclick="selectAspect(this)">❤️ Cinta</button>
    <button class="aspect-btn" data-aspect="Karier" onclick="selectAspect(this)">💼 Karier</button>
    <button class="aspect-btn" data-aspect="Keuangan" onclick="selectAspect(this)">💰 Keuangan</button>
    <button class="aspect-btn" data-aspect="Kesehatan" onclick="selectAspect(this)">🌿 Kesehatan</button>
  </div>

  <button class="gen-btn" onclick="generateHoroscope()" id="genBtn">✨ Lihat Ramalanku</button>

  <div class="loading-orbs" id="loadingOrbs">
    <div class="orb-dot"></div>
    <div class="orb-dot"></div>
    <div class="orb-dot"></div>
  </div>

  <div class="result-wrap" id="resultWrap">
    <div class="result-card">
      <div class="result-header">
        <div class="result-emoji" id="resultEmoji">♈</div>
        <div class="result-meta">
          <h2 id="resultTitle">Aries · Hari Ini</h2>
          <p id="resultAspect">Ramalan Umum</p>
        </div>
      </div>
      <div class="result-body" id="resultBody"></div>
      <div class="lucky-strip" id="luckyStrip"></div>
      <div class="star-row" id="starRow"></div>
    </div>
  </div>

  <div class="footer">
    <p>© 2025 <a href="#">Rapi Dev</a> · Powered by Claude AI ✨</p>
  </div>
</div>

<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;stars=Array.from({length:180},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.2,o:Math.random(),s:Math.random()*.006+.002}))}
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.o+=s.s;if(s.o>1||s.o<0)s.s*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,220,100,${s.o*.5})`;ctx.fill()});requestAnimationFrame(draw)}
  resize();window.addEventListener('resize',resize);draw();
})();

/* ── SHOOTING STARS ── */
function spawnShootingStar(){
  const el=document.createElement('div');el.className='shooting-star';
  el.style.cssText=`top:${Math.random()*60}%;left:${Math.random()*80+10}%;animation:shootAnim ${1+Math.random()}s linear forwards`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}
const style=document.createElement('style');
style.textContent='@keyframes shootAnim{from{transform:translate(0,0) rotate(-30deg);opacity:1}to{transform:translate(-200px,100px) rotate(-30deg);opacity:0}}';
document.head.appendChild(style);
setInterval(spawnShootingStar,3000);

/* ── STATE ── */
let selectedSign=null,selectedAspect='Umum';
const zodiacEmojis={Aries:'♈',Taurus:'♉',Gemini:'♊',Cancer:'♋',Leo:'♌',Virgo:'♍',Libra:'♎',Scorpio:'♏',Sagittarius:'♐',Capricorn:'♑',Aquarius:'♒',Pisces:'♓'};

function selectSign(el){
  document.querySelectorAll('.zodiac-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');selectedSign=el.dataset.sign;
}
function selectAspect(el){
  document.querySelectorAll('.aspect-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');selectedAspect=el.dataset.aspect;
}

const GEMINI_KEY = 'AQ.Ab8RN6IFZ5S3E1dIDJNTE13h8xVfO1RMCYXEdaPb2WilV1c3sA'; // ← Ambil gratis di: aistudio.google.com
async function generateHoroscope(){
  if(!selectedSign){alert('Pilih dulu zodiak kamu!');return}
  const btn=document.getElementById('genBtn');
  const loading=document.getElementById('loadingOrbs');
  const wrap=document.getElementById('resultWrap');
  const body=document.getElementById('resultBody');

  btn.disabled=true;loading.classList.add('visible');wrap.classList.remove('visible');

  const today=new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const prompt=`Kamu adalah astrolog profesional yang menyenangkan dan inspiratif. Buatkan ramalan harian untuk zodiak ${selectedSign} hari ini (${today}), fokus pada aspek: ${selectedAspect}.

Format respons WAJIB seperti ini (dalam Bahasa Indonesia):
[RAMALAN]
2-3 paragraf ramalan yang menarik, spesifik, dan memotivasi (total 120-150 kata)

[ANGKA KEBERUNTUNGAN]
3 angka (pisahkan koma)

[WARNA KEBERUNTUNGAN]
1 warna

[KATA KUNCI]
3 kata kunci hari ini (pisahkan koma)

[BINTANG]
Cinta: X/5 | Karier: X/5 | Energi: X/5 | Keberuntungan: X/5
(X adalah angka 1-5)`;

  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
    });
    const data=await res.json();
    const text=data.candidates[0].content.parts[0].text;

    // Parse sections
    const ramalanMatch=text.match(/\[RAMALAN\]([\s\S]*?)\[ANGKA/);
    const angkaMatch=text.match(/\[ANGKA KEBERUNTUNGAN\]([\s\S]*?)\[WARNA/);
    const warnaMatch=text.match(/\[WARNA KEBERUNTUNGAN\]([\s\S]*?)\[KATA/);
    const kataMatch=text.match(/\[KATA KUNCI\]([\s\S]*?)\[BINTANG\]/);
    const bintangMatch=text.match(/\[BINTANG\]([\s\S]*?)$/);

    const ramalan=ramalanMatch?ramalanMatch[1].trim():text;

    // Update UI
    document.getElementById('resultEmoji').textContent=zodiacEmojis[selectedSign];
    document.getElementById('resultTitle').textContent=`${selectedSign} · Hari Ini`;
    document.getElementById('resultAspect').textContent=`Ramalan ${selectedAspect}`;

    // Typing effect
    loading.classList.remove('visible');
    wrap.classList.add('visible');
    body.classList.add('typing');
    let i=0;body.textContent='';
    const typeInterval=setInterval(()=>{
      if(i<ramalan.length){body.textContent+=ramalan[i++]}
      else{clearInterval(typeInterval);body.classList.remove('typing');buildExtras(angkaMatch,warnaMatch,kataMatch,bintangMatch)}
    },18);

  }catch(e){
    loading.classList.remove('visible');
    wrap.classList.add('visible');
    body.textContent='Gagal memuat ramalan. Coba lagi ya! ✨';
  }
  btn.disabled=false;
}

function buildExtras(angka,warna,kata,bintang){
  const strip=document.getElementById('luckyStrip');
  const row=document.getElementById('starRow');
  strip.innerHTML='';row.innerHTML='';

  if(angka){
    const nums=angka[1].trim().replace(/\n/g,' ');
    strip.innerHTML+=`<span class="lucky-tag lt-gold">🎰 Angka: ${nums}</span>`;
  }
  if(warna){
    const w=warna[1].trim().replace(/\n/g,' ');
    strip.innerHTML+=`<span class="lucky-tag lt-pink">🎨 Warna: ${w}</span>`;
  }
  if(kata){
    const k=kata[1].trim().replace(/\n/g,' ');
    strip.innerHTML+=`<span class="lucky-tag lt-cyan">🔑 ${k}</span>`;
  }
  if(bintang){
    const b=bintang[1].trim();
    const pairs=b.match(/(\w+):\s*(\d)/g);
    if(pairs){
      pairs.forEach(p=>{
        const [label,num]=p.split(':');
        const stars='⭐'.repeat(parseInt(num.trim()));
        row.innerHTML+=`<span class="star-item">${label.trim()}: <span>${stars}</span></span>`;
      });
    }
  }
}
</script>
</body>
</html>
