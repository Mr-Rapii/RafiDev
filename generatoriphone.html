<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral iPhone Context Menu Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            gap: 40px;
        }

        /* Tata letak responsif: kolom di HP, baris di Desktop */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                align-items: center;
            }
        }

        /* Panel Kontrol */
        .controls {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        .controls h2 {
            margin-top: 0;
            font-size: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            color: #ddd;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-group textarea {
            resize: vertical;
            height: 60px;
        }

        /* Desain Mockup iPhone */
        .iphone-frame {
            width: 320px;
            height: 692px; /* Proporsi lebih akurat */
            background-color: #000;
            border: 16px solid #222;
            border-radius: 54px;
            position: relative;
            box-shadow: 0 0 0 3px #444, 0 30px 60px rgba(0,0,0,0.9);
            overflow: hidden;
            background-image: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=2000&auto=format&fit=crop'); /* Gambar dasar gelap */
            background-size: cover;
            background-position: center;
            transition: background-image 0.3s ease;
        }

        /* Dynamic Island / Notch */
        .dynamic-island {
            width: 106px;
            height: 31px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 17px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 90;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
        }
        .status-bar-time {
            padding-top: 15px;
        }
        .status-bar-icons {
            display: flex;
            gap: 6px;
            align-items: center;
            padding-top: 15px;
        }
        .icon-signal { width: 16px; height: 10px; background: #fff; border-radius: 1px; }
        .icon-wifi { width: 16px; height: 12px; } /* SVG ideal */
        .icon-battery { width: 22px; height: 11px; border: 1.5px solid #fff; border-radius: 3px; position: relative; }
        .icon-battery::after { content: ''; position: absolute; right: -3px; top: 3px; width: 2px; height: 4px; background: #fff; border-radius: 0 1px 1px 0; }

        /* Latar Belakang Blur */
        .blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 10;
        }

        /* Notifikasi Konteks / Gelembung */
        .context-container {
            position: absolute;
            bottom: 60px; /* Jarak dari Home Bar */
            left: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Gelembung Pesan */
        .context-message {
            background-color: #1c1c1e; /* Warna gelap pesan */
            color: #fff;
            padding: 12px 16px;
            border-radius: 20px;
            margin-right: 20%; /* Pesan dari kiri */
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            font-weight: 300; /* Lebih tipis seperti di gambar */
            margin: 0;
        }

        .message-time {
            font-size: 11px;
            color: #8e8e93;
            align-self: flex-end;
            margin-top: 5px;
        }

        /* Gelembung Reaksi di Atas Pesan */
        .context-reactions {
            background-color: rgba(44, 44, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            margin-left: 20px;
            margin-bottom: -15px; /* Bertumpuk sedikit */
            z-index: 25;
            position: relative;
        }

        .reaction {
            font-size: 20px;
        }

        /* Blok Menu Konteks di Bawah Pesan */
        .context-menu {
            background-color: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            color: #ddd;
            font-size: 15px;
            cursor: pointer;
            border-bottom: 1px solid #3a3a3c;
        }
        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-icon {
            width: 20px;
            height: 20px;
            color: #ddd;
        }

        /* Ikon SVG Inline yang Sangat Mirip */
        .svg-icon {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .menu-item-delete {
            color: #ff3b30; /* Merah seperti di gambar */
        }
        .menu-item-delete .menu-icon {
            color: #ff3b30;
        }

        /* Watermark Kecil di Pojok Kanan Bawah */
        .watermark {
            position: absolute;
            bottom: 30px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            text-align: right;
            line-height: 1.2;
            z-index: 80;
        }

        /* Home Bar di Bagian Bawah */
        .home-bar {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            z-index: 100;
        }

    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>
        <div class="blur-overlay"></div>
        <div class="home-bar"></div>
        
        <div class="status-bar">
            <div class="status-bar-time" id="display-sb-time">19:32</div>
            <div class="status-bar-icons">
                <svg class="icon-wifi" viewBox="0 0 26 20" fill="white"><path d="M13 3C10.1 3 7.4 4.1 5.3 6.1C5.1 6.3 5.1 6.7 5.3 6.9L6.7 8.3C6.9 8.5 7.2 8.5 7.4 8.3C9 7.1 11 6.5 13 6.5C15 6.5 17 7.1 18.6 8.3C18.8 8.5 19.1 8.5 19.3 8.3L20.7 6.9C20.9 6.7 20.9 6.3 20.7 6.1C18.6 4.1 15.9 3 13 3ZM13 11C11.5 11 10.1 11.6 9 12.6L12.3 15.9C12.7 16.3 13.3 16.3 13.7 15.9L17 12.6C15.9 11.6 14.5 11 13 11Z"/></svg>
                <div class="icon-signal"></div>
                <div class="icon-battery"></div>
            </div>
        </div>

        <div class="context-container">
            <div class="context-reactions">
                <span class="reaction">👍</span>
                <span class="reaction">❤️</span>
                <span class="reaction">😂</span>
                <span class="reaction">😯</span>
                <span class="reaction">😢</span>
                <span class="reaction">🙏</span>
                <span class="reaction">+</span>
            </div>

            <div class="context-message">
                <p class="message-text" id="display-msg-text">Selayaknya bunga, aku tidak bisa seindah masalalunya.</p>
                <span class="message-time" id="display-msg-time">19:31</span>
            </div>

            <div class="context-menu">
                <div class="menu-item">
                    <span>Membalas</span>
                    <div class="menu-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
                    </div>
                </div>
                <div class="menu-item">
                    <span>Teruskan</span>
                    <div class="menu-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M14 9V5l7 7-7 7v-4.1c-5 0-8.5 1.6-11 5.1 1-5 4-10 11-11z"/></svg>
                    </div>
                </div>
                <div class="menu-item">
                    <span>Salin</span>
                    <div class="menu-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14C6 22.1 6.9 23 8 23h11C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5zm0 16H8V7h11v14z"/></svg>
                    </div>
                </div>
                <div class="menu-item">
                    <span>Beri Bintang</span>
                    <div class="menu-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg>
                    </div>
                </div>
                <div class="menu-item menu-item-delete">
                    <span>Hapus</span>
                    <div class="menu-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19C6 20.1 6.9 21 8 21h8C17.1 21 18 20.1 18 19V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </div>
                </div>
                <div class="menu-item">
                    <span>Lainnya...</span>
                    <div class="menu-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="watermark" id="display-watermark">
            @__nnaaa__5<br>Dari komentar TikTok
        </div>
    </div>

    <div class="controls">
        <h2>Kontrol Generator</h2>
        
        <div class="input-group">
            <label for="input-sb-time">Waktu di Atas</label>
            <input type="text" id="input-sb-time" value="19:32">
        </div>
        
        <div class="input-group">
            <label for="input-msg-text">Isi Pesan</label>
            <textarea id="input-msg-text">Selayaknya bunga, aku tidak bisa seindah masalalunya.</textarea>
        </div>

        <div class="input-group">
            <label for="input-msg-time">Waktu Pesan</label>
            <input type="text" id="input-msg-time" value="19:31">
        </div>

        <div class="input-group">
            <label for="input-wm-text">Watermark Kanan Bawah</label>
            <textarea id="input-wm-text">@__nnaaa__5 Dari komentar TikTok</textarea>
            <p style="font-size: 11px; color: #aaa; margin-top: 5px;">*Teks di atas akan dipisahkan menjadi 2 baris.</p>
        </div>
    </div>

    <script>
        // Tangkap semua input kontrol
        const sbTimeInput = document.getElementById('input-sb-time');
        const msgTextInput = document.getElementById('input-msg-text');
        const msgTimeInput = document.getElementById('input-msg-time');
        const wmTextInput = document.getElementById('input-wm-text');

        // Tangkap semua elemen tampilan di mockup
        const sbTimeDisplay = document.getElementById('display-sb-time');
        const msgTextDisplay = document.getElementById('display-msg-text');
        const msgTimeDisplay = document.getElementById('display-msg-time');
        const watermarkDisplay = document.getElementById('display-watermark');

        // Fungsi Helper untuk update teks real-time
        function setupTextLink(inputEl, displayEl) {
            inputEl.addEventListener('input', (e) => {
                displayEl.textContent = e.target.value || " ";
            });
        }

        // Terapkan Link untuk teks dasar
        setupTextLink(sbTimeInput, sbTimeDisplay);
        setupTextLink(msgTextInput, msgTextDisplay);
        setupTextLink(msgTimeInput, msgTimeDisplay);

        // Kasus khusus untuk Watermark: Mengubah teks input menjadi dua baris
        wmTextInput.addEventListener('input', (e) => {
            const val = e.target.value || "@__nnaaa__5 Dari komentar TikTok";
            // Pisahkan teks kustom untuk membuatnya menjadi dua baris
            const lines = val.split('Dari komentar TikTok');
            watermarkDisplay.innerHTML = `${lines[0]}<br>Dari komentar TikTok`;
        });
    </script>
</body>
</html>
